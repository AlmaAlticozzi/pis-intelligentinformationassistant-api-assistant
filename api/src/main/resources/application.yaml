quarkus:
  console:
    basic: true
  test:
    continuous-testing: disabled
  datasource:
    db-kind: postgresql
    username: moova
    password: moova
    jdbc:
      url: jdbc:postgresql://localhost:5432/moova-lab
  hibernate-orm:
    multitenant: SCHEMA
    packages: "it.almaviva.moova.pis.intelligentinformationassistant.api.assistant.repository.entity"
    mapping:
      format:
        global: ignore
  jackson:
    write-dates-as-timestamps: false
  devservices:
    enabled: false
  smallrye-openapi:
    store-schema-directory: generated
    servers: /pis/intelligentinformationassistant/assistant/api
  langchain4j:
    openai:
      api-key: ${OPENAI_API_KEY}
      # Technical client timeout used by LangChain4j/OpenAI calls. The application-level
      # iia.ai.alert-verify.timeout-seconds value is retained for audit/future orchestration.
      timeout: ${IIA_OPENAI_TIMEOUT:60s}
      chat-model:
        model-name: ${IIA_OPENAI_MODEL:gpt-4.1-mini}
        temperature: 0.1
        max-tokens: 1200
  rest-client:
    # Prevent application/server @Provider interceptors from being auto-registered on technical
    # outbound clients such as LangChain4j OpenAI. The FND ResponseBodyInterceptor depends on
    # HTTP request-scoped state and must not run on external OpenAI client calls.
    provider-autodiscovery: false
  http:
    root-path: /pis/intelligentinformationassistant/assistant/api
    enable-compression: false
    cors:
      enabled: true
      origins: /.*/
      methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
      headers: accept,authorization,content-type,x-wtf-profile
      exposed-headers: location
      access-control-max-age: 24H



iia:
  alert-verification:
    # Dev/test fallback for invalid but parseable LLM JSON. Production should set this to false.
    fallback-on-invalid-llm: ${IIA_ALERT_VERIFICATION_FALLBACK_ON_INVALID_LLM:false}
  ai:
    provider: openai
    text-improve:
      enabled: true
      model: gpt-4.1-mini
      temperature: 0.1
      max-output-tokens: 1200
      timeout-seconds: 20
    alert-verify:
      enabled: true
      model: ${IIA_ALERT_VERIFY_MODEL:gpt-4.1-mini}
      temperature: ${IIA_ALERT_VERIFY_TEMPERATURE:0.1}
      max-output-tokens: ${IIA_ALERT_VERIFY_MAX_OUTPUT_TOKENS:2000}
      timeout-seconds: ${IIA_ALERT_VERIFY_TIMEOUT_SECONDS:60}
      simulate-provider-timeout: ${IIA_ALERT_VERIFY_SIMULATE_PROVIDER_TIMEOUT:false}

fnd:
  mode: ${FND_CORE_LIB_QUARKUS_MODE:}
  multi-tenant: ${FND_CORE_LIB_QUARKUS_MULTI_TENANT:}
  security:
    use-bearer-for-auth: ${FND_CORE_LIB_QUARKUS_SECURITY_USE_BEARER_FOR_AUTH:}
    profile-retriever: ${FND_CORE_LIB_QUARKUS_SECURITY_PROFILE_RETRIEVER:}
    jwt:
      skew: ${FND_CORE_LIB_QUARKUS_SECURITY_JWT_SKEW:}
    keystore:
      path: ${FND_CORE_LIB_QUARKUS_SECURITY_KEYSTORE_PATH:}
      password: ${FND_CORE_LIB_QUARKUS_SECURITY_KEYSTORE_PASSWORD:}
  api-filters:
    auto-configuration: ${FND_CORE_LIB_QUARKUS_API_FILTERS_AUTO_CONFIGURATION:}
    pagination-elements-in-response-body: ${FND_CORE_LIB_QUARKUS_API_FILTERS_PAGINATION_ELEMENTS_IN_RESPONSE_BODY:}
    business-logic-extension:
      strict: ${FND_CORE_LIB_QUARKUS_API_FILTERS_BUSINESS_LOGIC_EXTENSION_STRICT:}
      http-request-methods: ${FND_CORE_LIB_QUARKUS_API_FILTERS_BUSINESS_LOGIC_EXTENSION_HTTP_REQUEST_METHODS:}
    fnd-api-exception-logging:
      enabled: ${FND_CORE_LIB_QUARKUS_API_FILTERS_FND_API_EXCEPTION_LOGGING_ENABLED:}
      flags-override: ${FND_CORE_LIB_QUARKUS_API_FILTERS_FND_API_EXCEPTION_LOGGING_FLAGS_OVERRIDE:}
      include:
        message: ${FND_CORE_LIB_QUARKUS_API_FILTERS_FND_API_EXCEPTION_LOGGING_INCLUDE_MESSAGE:}
        stacktrace: ${FND_CORE_LIB_QUARKUS_API_FILTERS_FND_API_EXCEPTION_LOGGING_INCLUDE_STACKTRACE:}
  default-schema: ${FND_CORE_LIB_QUARKUS_DEFAULT_SCHEMA:pis_intelligentinformationassistant}
