            SERVICE_DATA_API_ONLY, SERVICE_DATA_EVENT_AND_API, TOOL_GATEWAY_ONLY or NO_EXTERNAL_NETWORK.
        maxRuntimeConcurrency:
          type: integer
          example: 1
          description: Maximum number of concurrent runtime executions allowed for a single Agent Definition using this profile.
            For scheduled agents it prevents overlapping polling executions.
        supportedInterpreterTypes:
          type: array
