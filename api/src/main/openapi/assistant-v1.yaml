      summary: Get Agent definition detail
      description: |
        Returns complete Agent definition information, including originating Alert reference, activation policy, compilation status, artifact metadata and latest runtime summary.

        The response does not expose raw generated source code. It exposes artifact metadata such as type, hash, signature state and implementation summary.

        ## Errors

        - `HTTP Status Code 400`, when the `agentDefinitionId` path parameter is empty or contains only whitespace characters. Error code: `IIA-AGD-GET-400-001`

        - `HTTP Status Code 404`, when no Agent definition with the given identifier is found. Error code: `IIA-AGD-GET-404-001`

        - `HTTP Status Code 500`, when an unexpected error occurs while reading the Agent definition. Error code: `IIA-AGD-GET-500-001`
      operationId: getAgentDefinition
      responses:
        '200':
          description: Agent definition returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDefinitionDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/UnexpectedError'
    patch:
      tags:
      - Agent Definitions
      summary: Patch an Agent definition
      description: |
        Updates mutable metadata of an Agent definition.

        Only non-runtime fields can be changed. The operation can update name, description, activation policy or profile while the definition is not active. Changes that affect generation semantics require a new Agent definition instead of mutating the existing one.

        An active Agent definition cannot be patched in a way that changes runtime behavior. Disable it first or create a new definition.

        ## Errors

        - `HTTP Status Code 400`, when the request body is not a valid JSON serialization of schema `AgentDefinitionPatchRequest`. Error code: `IIA-AGD-PAT-400-001`

        - `HTTP Status Code 404`, when no Agent definition with the given identifier is found. Error code: `IIA-AGD-PAT-404-001`

        - `HTTP Status Code 409`, when the Agent definition is active and the patch would change runtime behavior. Error code: `IIA-AGD-PAT-409-001`

        - `HTTP Status Code 500`, when an unexpected error occurs while patching the Agent definition. Error code: `IIA-AGD-PAT-500-001`
      operationId: patchAgentDefinition
