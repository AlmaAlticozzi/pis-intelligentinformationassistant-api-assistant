      summary: Search Agent definitions
      description: |
        Returns Agent definitions created from verified Alerts.

        An Agent definition is a versioned runtime contract. It references the Alert and Alert version used to generate it, the activation policy, the selected Agent Profile, the generation mode and the controlled artifact metadata.

        The endpoint is used by the Agent creation menu and by the Agent governance views. It does not return low-level runtime metrics; use Agent Run endpoints for runtime monitoring.

