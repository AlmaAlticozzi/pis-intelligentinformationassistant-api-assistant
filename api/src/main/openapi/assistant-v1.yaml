          example: STANDARD_DSL_RUNTIME
      description: |-
        Controlled runtime governance profile used when creating, compiling, activating and loading Agent Definitions.

        The profile is not just a Kubernetes sizing preset. It expresses resource budgets, network policy, concurrency limits and optional eligibility constraints for the shared Agent Orchestrator runtime.
    AgentGenerationPreviewRequest:
