  /v1/agent-definitions/{agentDefinitionId}/activate:
    parameters:
    - $ref: '#/components/parameters/XWtfProfile'
    - $ref: '#/components/parameters/AgentDefinitionId'
    post:
      tags:
      - Agent Definitions
      summary: Activate an Agent definition
      description: |
        Requests activation of a governed Agent Definition through the Agent Orchestrator.

        Activation is allowed only from `READY` or `DISABLED`. The Assistant validates the latest successful compilation, the controlled DSL artifact, canonical hash and signature metadata, the selected Agent Profile, the activation policy and the runtime contract before contacting the runtime plane.

        The Assistant is the source of truth for the desired governance lifecycle, while the Agent Orchestrator is the source of truth for observed runtime acceptance. Therefore the Assistant must persist `ACTIVE` only after the Orchestrator has accepted and committed the runtime package.

        ```text
        READY or DISABLED Agent Definition
            -> validate local lifecycle transition
            -> load latest successful compilation and DSL artifact
            -> validate artifact integrity, signature, profile, activation policy and runtime contract
            -> build governed Runtime Agent Package
            -> synchronously submit package to Agent Orchestrator
            -> Orchestrator validates, persists and loads the package
            -> only after successful Orchestrator response, persist Assistant status ACTIVE
        ```

        If the Orchestrator is unavailable, rejects transport before runtime acceptance, or the integration is intentionally disabled in the current implementation phase, the operation returns HTTP 503 and the Assistant Agent Definition remains unchanged, normally `READY` or `DISABLED`.

        Repeating activate for an already `ACTIVE` definition is rejected with HTTP 409. Runtime submission idempotency is handled by the stable submission identifier and package version sent to the Orchestrator; it does not make the Assistant lifecycle command valid from an incompatible local state.

        The operation never executes arbitrary code inside the Assistant API and never creates Agent Output or Suggestion records.

        ## Errors

        - `HTTP Status Code 404`, when no Agent Definition with the given identifier is found. Error code: `IIA-AGD-ACT-404-001`.
        - `HTTP Status Code 409`, when the Agent Definition is not in `READY` or `DISABLED`, is already `ACTIVE`, or another conflicting lifecycle transition is in progress. Error code: `IIA-AGD-ACT-409-001`.
        - `HTTP Status Code 422`, when the latest compilation, DSL artifact, hash, signature metadata, Agent Profile, activation policy or runtime contract is missing, invalid or incompatible with the supported runtime contract. Error code: `IIA-AGD-ACT-422-001`.
        - `HTTP Status Code 503`, when the Agent Orchestrator or a mandatory activation integration is unavailable. The Agent Definition state remains unchanged. Error code: `IIA-AGD-ACT-503-001`.
        - `HTTP Status Code 500`, when an unexpected error occurs while preparing or completing activation. Error code: `IIA-AGD-ACT-500-001`.
      operationId: activateAgentDefinition
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentActivationRequest'
      responses:
        '200':
          description: Agent Definition accepted by the Agent Orchestrator and persisted as ACTIVE by the Assistant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDefinitionDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/UnexpectedError'
  /v1/agent-definitions/{agentDefinitionId}/disable:
    parameters:
    - $ref: '#/components/parameters/XWtfProfile'
    - $ref: '#/components/parameters/AgentDefinitionId'
    post:
      tags:
      - Agent Definitions
      summary: Disable an Agent definition
      description: |
        Disables an Agent Definition while preserving its Alert reference, compilation, controlled artifact, runtime contract and audit history.

        The command has two governed paths:

        - `READY -> DISABLED`: the definition has not been accepted by the runtime plane, so the Assistant performs the transition locally and returns HTTP 200 without contacting the Orchestrator.
        - `ACTIVE -> DISABLED`: the Assistant synchronously asks the Agent Orchestrator to disable the runtime definition and persists `DISABLED` only after the Orchestrator confirms the observed runtime transition.

        Repeating disable for an already `DISABLED` definition is idempotent and returns HTTP 200 without creating duplicate runtime commands or modifying compilation artifacts.

        ```text
        READY
            -> local lifecycle validation
            -> persist DISABLED

        ACTIVE
            -> local lifecycle validation
            -> synchronously call Agent Orchestrator disable
            -> Orchestrator prevents new evaluations and applies the requested run-stop policy
            -> only after successful Orchestrator response, persist Assistant status DISABLED
        ```

        If an `ACTIVE` definition cannot be delivered to the Orchestrator, or the runtime integration is intentionally unavailable in the current implementation phase, the operation returns HTTP 503 and the Assistant status remains `ACTIVE`.

        `stopRunningAgents`, `gracePeriodSeconds` and `reason` are runtime command parameters. They do not delete Agent Runs, runtime history, the compiled artifact, Agent Outputs already persisted by the runtime, or Suggestions already governed by the Assistant.

        ## Errors

        - `HTTP Status Code 404`, when no Agent Definition with the given identifier is found. Error code: `IIA-AGD-DIS-404-001`.
        - `HTTP Status Code 409`, when the Agent Definition is not in `READY`, `ACTIVE` or `DISABLED`, or another conflicting lifecycle transition is in progress. Error code: `IIA-AGD-DIS-409-001`.
        - `HTTP Status Code 422`, when the requested stop policy cannot be applied to the current runtime assignment or is rejected as semantically unsupported by the Agent Orchestrator. Error code: `IIA-AGD-DIS-422-001`.
        - `HTTP Status Code 503`, when an `ACTIVE` Agent Definition cannot be disabled because the Agent Orchestrator or a mandatory runtime subsystem is unavailable. The Assistant state remains unchanged. Error code: `IIA-AGD-DIS-503-001`.
        - `HTTP Status Code 500`, when an unexpected error occurs while disabling the Agent Definition. Error code: `IIA-AGD-DIS-500-001`.
      operationId: disableAgentDefinition
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentDisableRequest'
      responses:
        '200':
          description: Agent Definition disabled successfully, or already DISABLED according to the idempotent lifecycle contract.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDefinitionDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
        '500':
          $ref: '#/components/responses/UnexpectedError'
