      enum:
      - SERVICE_DATA_JOURNEY
      - SERVICE_DATA_JOURNEY_AGGREGATE
      - MONITORED_AUDIO_MESSAGE
      - MONITORED_AUDIO_MESSAGE_AGGREGATE
      - GENERIC
      example: SERVICE_DATA_JOURNEY
    AlertStatus:
      type: string
      description: |
        Alert lifecycle status.
        `DRAFT` means that the alert has only been persisted. No AI-assisted verification has been started yet, no controlled interpreter is available and the alert cannot be enabled.
        `VERIFYING` means that the alert prompt is being verified or re-verified.
        `VERIFIED` means that the alert has a valid controlled interpreter and can be enabled.
        `REJECTED` means that the prompt cannot be safely or deterministically implemented.
        `ERROR` means that verification or runtime preparation failed.
        `DELETED` means that the alert is soft-deleted and must not be returned by ordinary search operations.
      enum:
      - DRAFT
      - VERIFYING
      - VERIFIED
      - REJECTED
      - ERROR
      - DELETED
      example: VERIFIED
    AlertVerificationStatus:
      type: string
      description: Status of the AI-assisted verification flow for an alert prompt. `PENDING` also covers a newly created
        `DRAFT` alert for which verification has not started yet.
      enum:
      - PENDING
      - VERIFIED
      - REJECTED
      - ERROR
      example: VERIFIED
    AlertInterpreterType:
      type: string
      description: |
        Type of controlled interpreter produced by alert verification.
        Use `EVENT_INTERPRETER` for alerts triggered by domain events.
        Use `SCHEDULED_INTERPRETER` for alerts evaluated periodically by backend-managed logic. The public Alert creation contract does not accept a schedule; timing details are derived by verification or handled by Agent runtime configuration.
      enum:
      - EVENT_INTERPRETER
      - SCHEDULED_INTERPRETER
      example: EVENT_INTERPRETER
    AlertTechnicalSpecificationResponse:
      type: object
      required:
      - alert
      - status
      - verificationStatus
      - technicalSpecificationEdited
      - technicalSpecification
      properties:
        alert:
          $ref: '#/components/schemas/AlertReference'
        status:
          $ref: '#/components/schemas/AlertStatus'
        verificationStatus:
          $ref: '#/components/schemas/AlertVerificationStatus'
        interpreterType:
          $ref: '#/components/schemas/AlertInterpreterType'
        inputModel:
          type: string
          description: Input model declared by the validated technical specification.
          example: ServiceDataStopPointJourneysV2
        outputModel:
          type: string
          description: Output model declared by the validated technical specification.
          example: AgentOutput.CANDIDATE_SUGGESTION
        technicalSpecificationEdited:
          type: boolean
          description: Indicates whether the current technical specification was manually replaced after the last successful
            AI-assisted verification.
          example: true
        technicalSpecification:
          $ref: '#/components/schemas/AlertTechnicalSpecification'
        agentBlueprintPreviewRegenerated:
          type: boolean
          description: |
            Indicates whether the backend regenerated, refreshed or realigned the Agent Blueprint
            preview from the current technical specification during the last replacement operation.

            For read-only GET operations this field can be omitted or set according to the latest
            known persisted state.
          example: true
        warnings:
          type: array
          description: Non-blocking warnings produced while reading or replacing the technical specification.
          items:
            type: string
          example:
          - Alert was disabled after manual technical specification replacement and must be explicitly enabled again.
    AlertTechnicalSpecificationUpdateRequest:
      type: object
      required:
      - technicalSpecification
      properties:
        technicalSpecification:
          $ref: '#/components/schemas/AlertTechnicalSpecification'
    AlertTechnicalSpecification:
      type: object
      description: |
        Backend-validated, non-executable technical specification of an Alert.

        The object represents the controlled interpretation of the Alert prompt and is the source
        of truth for future Agent generation flows. Its concrete structure depends on the
        interpreter type and evaluation mode.

        For `EVENT_INTERPRETER`, the specification describes a stateless condition over realtime
        `ServiceDataV2` event messages.

        For `SCHEDULED_INTERPRETER`, the specification describes a scheduled snapshot evaluation
        over Service Data API results, including schedule, service data query, output policy and
        snapshot evaluation rules.

        The API intentionally models this object as an extensible JSON artifact because its exact
        shape is governed by backend validators and capability catalogs rather than by arbitrary
        client-side editing. Clients may display and submit the JSON, but the backend remains the
        authority that validates whether the specification is acceptable.

        This object must never contain executable code, scripts, SQL statements or ungoverned
        instructions.
      additionalProperties: true
      example:
        source: SERVICE_DATA
        schemaVersion: iia.alert.technical-specification/v2
        interpreterType: SCHEDULED_INTERPRETER
        triggerType: SCHEDULE
        accessMode: SERVICE_DATA_API_SNAPSHOT
        inputModel: ServiceDataStopPointJourneysV2
        outputModel: AgentOutput.CANDIDATE_SUGGESTION
        evaluationMode: SCHEDULED_SNAPSHOT_MATCH
        schedule:
          frequencySeconds: 600
          defaulted: true
        serviceDataQuery:
          operation: POST /v2/stoppointjourneys
          stopPoints:
          - TNPNTS00000000000009
          monitoringScope: EXPLICIT_STOP_POINTS
          requiresAllKnownStopPoints: false
          timeWindow:
            startMode: NOW_TRUNCATED_TO_MINUTE
            endMode: NOW_PLUS_DEFAULT_LOOKAHEAD
            lookaheadMinutes: 480
            defaulted: true
        outputPolicy:
          emit: EVERY_RUN
          includeCount: true
          includeMatchingJourneys: false
        snapshotEvaluation:
          mode: REPORT_COUNT
          journeyPath: stopPointsJourneyDetails[]
          condition:
            type: SERVICE_DATA_SCHEDULED_FIELD_MATCH
            anyElement:
              path: stopPointsJourneyDetails[]
              conditions:
                all:
                - field: departureDelay.delay
                  operator: GREATER_THAN
                  value: 0
