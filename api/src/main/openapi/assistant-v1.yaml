  /v1/alerts/{alertId}/technical-specification:
    parameters:
    - $ref: '#/components/parameters/XWtfProfile'
    - $ref: '#/components/parameters/AlertId'
    get:
      tags:
      - Alerts
      summary: Get alert technical specification
      description: |
        Returns the current backend-validated technical specification associated with a verified Alert.

        The technical specification is the controlled, non-executable interpretation produced by the
        Alert verification pipeline. It describes how the Alert condition is represented through
        supported PIS data sources, interpreter type, trigger type, input model, output model and
        evaluation rules.

        This endpoint is intended for diagnostics, expert review and UI inspection. It exposes the
        technical specification as a structured JSON artifact without exposing executable code.

        ## Source of truth

        For a verified Alert, the technical specification is the source of truth for future Agent
        generation flows. The Agent Blueprint preview is considered a derived artifact/cache built
        from the latest valid technical specification.

        ## Supported Alert types

        The endpoint supports technical specifications generated for controlled Alert interpreters,
        including:

        - `EVENT_INTERPRETER` specifications based on realtime `ServiceDataV2` event messages.
        - `SCHEDULED_INTERPRETER` specifications based on Service Data API snapshot evaluation,
          currently represented through `POST /v2/stoppointjourneys`.

        ## Behaviour

        - The Alert must exist.
        - The Alert must not be logically deleted.
        - The Alert must be verified.
        - The Alert must contain a non-empty validated technical specification.
        - The operation is read-only.
        - The operation must not invoke the AI provider.
        - The operation must not regenerate the Agent Blueprint preview.
        - The operation must not create Agent Definitions, Agent Runs, Agent Outputs or Suggestions.

        ## Errors

        - `HTTP Status Code 400`, when the `alertId` path parameter is empty or contains only
          whitespace characters. Error code: `IIA-ALT-TSP-GET-400-001`

        - `HTTP Status Code 400`, when the `alertId` path parameter exceeds 50 characters.
          Error code: `IIA-ALT-TSP-GET-400-002`

        - `HTTP Status Code 404`, when no alert with the given `alertId` is found.
          Error code: `IIA-ALT-TSP-GET-404-001`

        - `HTTP Status Code 409`, when the alert is deleted and its technical specification cannot
          be exposed as an operational artifact. Error code: `IIA-ALT-TSP-GET-409-001`

        - `HTTP Status Code 409`, when the alert is not verified. Error code:
          `IIA-ALT-TSP-GET-409-002`

        - `HTTP Status Code 422`, when the alert is verified but does not contain a valid persisted
          technical specification. Error code: `IIA-ALT-TSP-GET-422-001`

        - `HTTP Status Code 500`, when an unexpected error occurs while reading the technical
          specification. Error code: `IIA-ALT-TSP-GET-500-001`
      operationId: getAlertTechnicalSpecification
      responses:
        '200':
          description: Alert technical specification returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertTechnicalSpecificationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/UnexpectedError'
    put:
      tags:
      - Alerts
      summary: Replace alert technical specification
      description: |
        Replaces the current technical specification of a verified Alert with an expert-provided
        technical specification.

        This operation is intentionally restricted to expert users and must be treated as a governed
        manual correction workflow. The submitted JSON must not be persisted as-is without validation:
        the backend must validate it with the same controlled validation layer used by the Alert
        verification pipeline.

        ## Source of truth and derived artifacts

        The submitted technical specification becomes the new source of truth only if backend
        validation succeeds.

        After a successful replacement:

        - the Alert remains verified;
        - the technical specification is replaced;
        - the Alert is marked as manually edited through `technicalSpecificationEdited = true`;
        - the Agent Blueprint preview must be regenerated, refreshed or realigned as a derived
          artifact from the updated technical specification;
        - if the Alert was enabled, the backend must disable it until the operator explicitly
          enables it again, because the runtime interpretation has changed through a manual action

        The API does not accept an Agent Blueprint preview in input. The blueprint preview is not an
        independent source of truth and must not be manually edited through this endpoint.

        ## Validation contract

        The backend must validate the submitted specification according to the declared interpreter
        and data contract.

        For `EVENT_INTERPRETER`, validation must ensure that the specification is compatible with
        realtime `ServiceDataV2` event evaluation and with the supported condition DSL.

        For `SCHEDULED_INTERPRETER`, validation must ensure that the specification is compatible with
        Service Data API snapshot evaluation, including schedule, service data query, snapshot
        evaluation, output policy, supported fields, supported operators, supported enum values,
        location resolution and array-correlation rules.

        The validator must reject:

        - executable code or script-like payloads;
        - unsupported data sources;
        - unsupported interpreter types;
        - unsupported fields or operators;
        - invalid stop point identifiers;
        - malformed condition trees;
        - Scheduled specifications contaminated by Event-only fields;
        - Event specifications contaminated by Scheduled-only structures;
        - specifications that ignore required constraints encoded by the controlled contract.

        ## Behaviour

        - The Alert must exist.
        - The Alert must not be logically deleted.
        - The Alert must be verified before manual replacement.
        - The request body must contain a `technicalSpecification` object.
        - The backend must validate the submitted specification before saving it.
        - The backend must not invoke the Alert verification LLM flow.
        - The backend must not use this operation to reinterpret the original prompt.
        - The backend must not create Agent Definitions, Agent Runs, Agent Outputs or Suggestions.
        - A successful replacement increments the Alert version.
        - A successful replacement must be auditable through Alert version history or equivalent
          persistence.
        - A later `POST /v1/alerts/{alertId}/verify` recalculates the specification from the
          original prompt and resets `technicalSpecificationEdited` to `false`.

        ## Errors

        - `HTTP Status Code 400`, when the `alertId` path parameter is empty or contains only
          whitespace characters. Error code: `IIA-ALT-TSP-PUT-400-001`

        - `HTTP Status Code 400`, when the `alertId` path parameter exceeds 50 characters.
          Error code: `IIA-ALT-TSP-PUT-400-002`

        - `HTTP Status Code 400`, when the request body is missing.
          Error code: `IIA-ALT-TSP-PUT-400-003`

        - `HTTP Status Code 400`, when the request body is not a valid JSON serialization of schema
          `AlertTechnicalSpecificationUpdateRequest`. Error code: `IIA-ALT-TSP-PUT-400-004`

        - `HTTP Status Code 400`, when `technicalSpecification` is missing or is not a JSON object.
          Error code: `IIA-ALT-TSP-PUT-400-005`

        - `HTTP Status Code 404`, when no alert with the given `alertId` is found.
          Error code: `IIA-ALT-TSP-PUT-404-001`

        - `HTTP Status Code 409`, when the alert is deleted and cannot be modified.
          Error code: `IIA-ALT-TSP-PUT-409-001`

        - `HTTP Status Code 409`, when the alert is not verified. Error code:
          `IIA-ALT-TSP-PUT-409-002`

        - `HTTP Status Code 409`, when the alert is currently verifying or another technical
          specification update is already in progress. Error code: `IIA-ALT-TSP-PUT-409-003`

        - `HTTP Status Code 422`, when the submitted technical specification is syntactically valid
          JSON but fails backend validation. Error code: `IIA-ALT-TSP-PUT-422-001`

        - `HTTP Status Code 422`, when the submitted technical specification uses unsupported
          sources, fields, operators, enum values, interpreter types or evaluation modes.
          Error code: `IIA-ALT-TSP-PUT-422-002`

        - `HTTP Status Code 500`, when an unexpected error occurs while replacing the technical
          specification. Error code: `IIA-ALT-TSP-PUT-500-001`
      operationId: updateAlertTechnicalSpecification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertTechnicalSpecificationUpdateRequest'
      responses:
        '200':
          description: Alert technical specification replaced successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertTechnicalSpecificationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/UnexpectedError'
