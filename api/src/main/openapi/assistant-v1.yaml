      - occurredAt
      properties:
        id:
          type: string
          maxLength: 50
        eventType:
          $ref: '#/components/schemas/AgentRuntimeEventType'
        agentRunId:
          type: string
          maxLength: 50
        agentDefinitionId:
          type: string
          maxLength: 50
        severity:
          $ref: '#/components/schemas/AgentRuntimeEventSeverity'
        reason:
