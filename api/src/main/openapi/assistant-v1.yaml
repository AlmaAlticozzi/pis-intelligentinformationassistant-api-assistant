        ## Errors

        Invalid parameters should raise an HTTP Status Code 400 according with the following list:

        - `HTTP Status Code 400`, when the `status` query parameter is not a valid value of `AgentDefinitionStatus`. Error code: `IIA-AGD-SEA-400-001`
        - `HTTP Status Code 400`, when the `generationMode` query parameter is not a valid value of `AgentGenerationMode`. Error code: `IIA-AGD-SEA-400-002`
        - `HTTP Status Code 400`, when the `text` query parameter exceeds 200 characters. Error code: `IIA-AGD-SEA-400-003`
