openapi: 3.0.3
info:
  x-moova-component:
  - pis-intelligentinformationassistant-api-assistant
  title: PIS - Intelligent Information Assistant - Assistant API
  version: 0.0.10
  description: |
    Domain API for the **PIS Intelligent Information Assistant** inside the Moova Passenger Information System.
    The service is implemented by the microservice `pis-intelligentinformationassistant-api-assistant`.

    ## Purpose

    The Assistant API provides AI-assisted operational support to PIS operators through four integrated capabilities:

    1. **Operational suggestions** generated by controlled Agent outputs and reviewed by the operator.
    2. **Alert configuration** where operators define free-text alert prompts that are verified and transformed into governed technical specifications.
    3. **Agent governance** where operators create, compile, activate, monitor, stop and troubleshoot digital workers derived from verified alerts.
    4. **Assistant conversations** where operators ask natural-language questions and the backend answers by orchestrating Moova domain tools.

    ## Target architecture

    ```text
    pis-intelligentinformationassistant-ui-console
            |
            v
    pis-intelligentinformationassistant-api-assistant
            |
            +-- Suggestion Service
            +-- Alert Service
            +-- Agent Definition Service
            +-- Agent Compilation Service
            +-- Agent Run / Monitoring Service
            +-- Conversation Manager
            +-- Intent Resolver
            +-- Tool Orchestrator
            +-- Context Builder
            +-- Response Generator
            |
            +-- Integration Layer
                  |
                  +-- Agent Compiler
                  +-- Agent Orchestrator / Agent Runtime
                  +-- Agent Monitor Processor
                  +-- JourneyTool
                  +-- ServiceDataTool
                  +-- AnnouncementTool
                  +-- BroadcastTool
                  +-- ContentTool
                  +-- DeviceTool
                  +-- ConfigurationTool
    ```

    ## Core design rule

    The Assistant API is the **control plane** of PIS IIA. It is not a local Service Data clone and it is not the operational source of truth for journeys, stop points, delays, cancellations, announcements, broadcasts, devices or playback history.

    Operational facts must come from Moova domain APIs, events, logs or controlled backend tools. The local database stores alert definitions, verified technical specifications, generated Agent definitions, compilation artifacts, Agent runs, Agent outputs, suggestion records, context snapshots, operator actions and assistant audit traces.

    ## Alert, Agent and Suggestion model

    An **Alert** is a user-defined monitoring intention. It contains the free-text rule written by the operator, its lifecycle, its verification status and the technical interpretation produced by the verification flow.

    An **Alert technical specification** is the backend-validated source of truth produced by Alert Verify or by the governed expert technical-specification endpoint. It is declarative and non-executable. It describes source, interpreter type, trigger type, input model, output model, evaluation mode and the condition/evaluation tree.

    An **Agent Definition** is a persistent and versioned runtime contract derived from a verified Alert and a specific Alert version. It contains the selected Agent Profile, activation policy, generation mode, validated Blueprint, controlled DSL artifact metadata and runtime contract. Updating an Alert does not mutate already created Agent definitions; a new Alert version must produce a new Agent definition.

    An **Agent Profile** is a runtime governance profile. It is not only a Kubernetes pod size. It declares resource budgets, runtime limits, network policy and optional eligibility constraints used by compilation, activation and Agent Orchestrator loading.

    An **Agent Run** is a concrete runtime execution or runtime assignment of an Agent Definition by the Agent Orchestrator. The default model is a shared standard runtime that loads multiple active Agent definitions and evaluates their DSL artifacts against events or scheduled snapshots. Kubernetes references are optional runtime diagnostics, not the mandatory execution model for one Agent.

    An **Agent Output** is the technical candidate produced by an Agent Run. It is not a Suggestion yet. It must pass schema validation, policy validation, deduplication and optional AI-assisted normalization before the backend creates or updates a Suggestion.

    A **Suggestion** is the operator-facing result. It is generated from a validated Agent Output, starts in `TO_REVIEW` unless an error occurs, and can be approved, edited or rejected only by the operator.

    ```text
    Operator prompt
        -> Alert
        -> Alert verification
        -> backend-validated technical specification
        -> Agent generation preview
        -> Agent Definition
        -> Agent compilation
        -> controlled DSL artifact validation/signing
        -> Agent activation
        -> Agent Orchestrator loads ACTIVE definition
        -> Agent Runtime evaluates events or scheduled snapshots
        -> Agent Output
        -> Output validation and deduplication
        -> Suggestion
        -> Operator review
    ```

    ## Agent generation and execution model

    The API does not expose arbitrary executable code to the UI. Agent generation is a controlled backend process with three conceptual levels:

    ```text
    Agent Blueprint   -> structured JSON view derived from the verified Alert technical specification
    Agent DSL         -> controlled YAML/JSON rule interpreted by a standard runtime evaluator
    Generated Java    -> optional future advanced artifact generated only from approved templates
    ```

    The recommended and primary execution path is **DSL first**. A future Java-template artifact is allowed only as an advanced, tightly governed option and requires static analysis, isolated compilation, automatic tests, bytecode checks, artifact hashing and artifact signing.

    An Agent Definition is not executed by launching arbitrary generated code. The Agent Orchestrator loads ACTIVE definitions and uses a standard DSL evaluator. For `EVENT_INTERPRETER`, the runtime evaluates ServiceData events received from Kafka. For `SCHEDULED_INTERPRETER`, the runtime executes controlled polling against ServiceData API snapshots and evaluates `snapshotEvaluation`.

    ## Agent activation model

    Agent definitions can be activated through one of the supported activation policies:

    ```text
    CONTINUOUS
      valid from a local date-time to a local date-time in the declared timezone.

    DAILY_WINDOW
      valid between two local dates and active only inside a daily time window,
      optionally restricted to selected days of week.
    ```

    The activation policy belongs to the Agent definition, not to the Suggestion. It controls when the Agent Orchestrator may load, schedule or evaluate the Agent Definition. Activation does not imply that the Assistant API itself executes the Agent.

    ## Agent monitoring model

    Agent monitoring combines technical, functional and quality information:

    ```text
    Technical health
      orchestrator instance, runtime assignment, optional Kubernetes reference, heartbeat, CPU, memory, network, last error.

    Functional progress
      processed events, scheduled executions, generated outputs, valid outputs, discarded outputs, created suggestions.

    Quality feedback
      approved suggestions, rejected suggestions, modified suggestions, duplicate rate, rejection rate, quality score.
    ```

    The UI can show both a detailed Agent Monitor view and aggregated dashboard KPIs such as active agents, degraded agents, total resources, output volume and suggestion approval rate.

    ## LLM responsibility boundary

    The LLM may help with alert verification, Agent blueprint generation, DSL proposal, intent/entity extraction, tool-planning proposals, answer formatting and suggestion wording.

    The LLM must not be the source of operational truth, must not invent journeys, delays, devices, messages or alternatives, must not bypass backend validation, must not directly call arbitrary APIs and must not produce arbitrary code that is executed by the Agent Orchestrator.

    ## Human in the loop

    The Assistant supports the operator and does not replace the operator. The API does not publish passenger information automatically. Approval, rejection and message edits are explicit operator actions.

    ## Authentication

    Every request requires:

    1. `Authorization`: Bearer token generated after login.
    2. `X-WTF-PROFILE`: profile chosen by the user.
  contact:
    name: Matteo Alticozzi
    email: m.alticozzi@almaviva.it
servers:
- url: /pis/intelligentinformationassistant/assistant/api
  description: Base path for PIS Intelligent Information Assistant Assistant API
tags:
- name: Suggestions
  description: Query and manage AI-assisted operational suggestions generated from validated Agent outputs.
- name: Alerts
  description: Configure, verify and govern dynamic AI-assisted alert definitions, including expert review of validated technical
    specifications.
- name: Agent Profiles
  description: Read predefined Agent resource profiles available for Agent definitions.
- name: Agent Definitions
  description: Create, compile, activate, disable and inspect versioned Agent definitions derived from verified alerts.
- name: Agent Runs
  description: Monitor, troubleshoot and control runtime Agent executions.
- name: Agent Outputs
  description: Inspect raw candidate outputs produced by Agent runs before or after conversion into suggestions.
- name: Assistant
  description: Ask natural-language operational questions through assistant sessions.
- name: Utilities
  description: Small utility operations backed by the AI provider, used by the UI and by backend flows for controlled text
    normalization.
- name: Diagnostics
  description: Read audit and diagnostic information for questions, alerts, agents and suggestions.
paths:
  /v1/suggestions:
    parameters:
    - $ref: '#/components/parameters/XWtfProfile'
    get:
      tags:
      - Suggestions
      summary: Search suggestion headers
      description: |
        Returns the suggestion list used by the suggestion dashboard.

        ## Additional notes

        - The `lookbackHours` parameter is mandatory and is evaluated using the backend server time as reference.

        - The response includes suggestions with `generatedAt >= now - lookbackHours`.

        - Results are ordered by `generatedAt DESC`.

        - The `status` filter supports multiple values and can be sent as repeated query parameters.

        - The `alertId`, `targetType` and `eventName` filters are exact-match filters.

        - The `text` filter is a partial-match filter over searchable suggestion fields such as target title, target subtitle, reason, operator advice preview and passenger message preview.

        - Suggestions generated by scheduled interpreters and not linked to a specific operational event use `eventName = AUTO`.

        - The response returns compact suggestion headers only. Use `GET /v1/suggestions/{suggestionId}` to retrieve full details, diagnostic context and editable texts.

        ## Errors

        Invalid parameters should raise an HTTP Status Code 400 according with the following list:

        - `HTTP Status Code 400`, when the `lookbackHours` query parameter is missing. Error code: `IIA-SUG-SEA-400-001`

        - `HTTP Status Code 400`, when the `lookbackHours` query parameter is lower than `1` or greater than `4800`. Error code: `IIA-SUG-SEA-400-002`

        - `HTTP Status Code 400`, when one or more `status` values are not valid values of `SuggestionStatus`. Error code: `IIA-SUG-SEA-400-003`

        - `HTTP Status Code 400`, when the `alertId` query parameter exceeds 50 characters. Error code: `IIA-SUG-SEA-400-004`

        - `HTTP Status Code 400`, when the `targetType` query parameter is not a valid value of `SuggestionTargetType`. Error code: `IIA-SUG-SEA-400-005`

        - `HTTP Status Code 400`, when the `eventName` query parameter exceeds the supported maximum length. Error code: `IIA-SUG-SEA-400-006`

        - `HTTP Status Code 400`, when the `text` query parameter exceeds 200 characters. Error code: `IIA-SUG-SEA-400-007`

        - `HTTP Status Code 500`, when an unexpected error occurs while searching suggestions. Error code: `IIA-SUG-SEA-500-001`


        - The `agentDefinitionId` and `agentRunId` filters allow the UI to navigate from Agent Monitor to the suggestions generated by a specific digital worker.

        - `HTTP Status Code 400`, when `agentDefinitionId` or `agentRunId` exceeds 50 characters. Error code: `IIA-SUG-SEA-400-008`
      operationId: searchSuggestionHeaders
      parameters:
      - name: lookbackHours
        in: query
        required: true
        description: Number of hours to look back from server `now`. The response includes suggestions with `generatedAt >=
          now - lookbackHours`.
        schema:
          type: integer
          minimum: 1
          maximum: 4800
          example: 24
      - name: status
        in: query
        required: false
        description: Optional exact filter by suggestion status. Can be repeated by clients that support repeated query parameters.
        schema:
          type: array
          items:
            $ref: '#/components/schemas/SuggestionStatus'
        style: form
        explode: true
      - name: alertId
        in: query
        required: false
        description: Optional exact filter by the alert that generated the suggestion.
        schema:
          type: string
          maxLength: 50
          example: ALRT2026251400000001
      - name: targetType
        in: query
        required: false
        description: Optional exact filter by target type.
        schema:
          $ref: '#/components/schemas/SuggestionTargetType'
      - name: eventName
        in: query
        required: false
        description: Optional exact filter by operational event name. When a suggestion was generated by a scheduled interpreter
          and not by a specific event, the backend uses `AUTO`.
        schema:
          type: string
          maxLength: 100
          example: CANCELLATION
      - name: text
        in: query
        required: false
        description: Generic partial-match UI filter over header fields.
        schema:
          type: string
          maxLength: 200
          example: RV 1234
      - name: agentDefinitionId
        in: query
        required: false
        description: Optional exact filter by Agent definition that generated the suggestion through an Agent output.
        schema:
          type: string
          maxLength: 50
      - name: agentRunId
        in: query
        required: false
        description: Optional exact filter by Agent run that generated the source Agent output.
        schema:
          type: string
          maxLength: 50
      responses:
        '200':
          description: Suggestion headers returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SuggestionHeader'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/UnexpectedError'
  /v1/suggestions/{suggestionId}:
    parameters:
    - $ref: '#/components/parameters/XWtfProfile'
    - $ref: '#/components/parameters/SuggestionId'
    get:
      tags:
      - Suggestions
      summary: Get suggestion detail
      description: |
        Returns the complete detail of a suggestion.

        The backend must not regenerate the suggestion during a simple GET. It returns the persisted target, reason, operator advice, passenger message proposal, edit flags, operator action data and compact diagnostic metadata.

        ## Additional notes

        - This operation returns the persisted suggestion detail and must not regenerate the suggestion.

        - The response includes target details, source metadata, generated texts, operator edits, operator action data and compact diagnostic context.

        - The `context` field is intended for diagnostics and troubleshooting, not for primary UI layout.

        - The original generated texts are returned in `generatedOperatorAdvice` and `generatedPassengerMessage` when available.

        - The editable current texts are returned in `operatorAdvice` and `passengerMessage`.

        ## Errors

        - `HTTP Status Code 400`, when the `suggestionId` path parameter is empty or contains only whitespace characters. Error code: `IIA-SUG-GET-400-001`

        - `HTTP Status Code 400`, when the `suggestionId` path parameter exceeds 50 characters. Error code: `IIA-SUG-GET-400-002`

        - `HTTP Status Code 404`, when no suggestion with the given `suggestionId` is found. Error code: `IIA-SUG-GET-404-001`

        - `HTTP Status Code 500`, when an unexpected error occurs while reading the suggestion. Error code: `IIA-SUG-GET-500-001`
      operationId: getSuggestionDetail
      responses:
        '200':
          description: Suggestion detail returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestionDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/UnexpectedError'
  /v1/suggestions/{suggestionId}/texts:
    parameters:
    - $ref: '#/components/parameters/XWtfProfile'
    - $ref: '#/components/parameters/SuggestionId'
    patch:
      tags:
      - Suggestions
      summary: Edit suggestion texts
      description: |
        Updates the editable operator-facing and passenger-facing texts of a suggestion while it is still under review.

        Allowed source status: `TO_REVIEW`.

        This operation does not approve the suggestion. It only stores the operator edits and updates the edit flags:

        - `operatorAdviceEdited` is true when `operatorAdvice` is provided and differs from the generated advice.
        - `passengerMessageEdited` is true when `passengerMessage` is provided and differs from the generated passenger message.


        ## Additional notes

        - This operation only updates editable texts and does not approve or reject the suggestion.

        - Text editing is allowed only when the suggestion status is `TO_REVIEW`.

        - `operatorAdviceEdited` is set to `true` when `operatorAdvice` is provided and differs from the original generated advice.

        - `passengerMessageEdited` is set to `true` when `passengerMessage` is provided and differs from the original generated passenger message.

        - Sending `passengerMessage = null` explicitly requests removal of the passenger-facing message, if the implementation allows it.

        - Omitted fields must keep their current persisted value unchanged.

        - `operatorNote` can be used to store the reason for the manual edit.

        ## Errors

        Invalid parameters should raise an HTTP Status Code 400 according with the following list:

        - `HTTP Status Code 400`, when the `suggestionId` path parameter is empty or contains only whitespace characters. Error code: `IIA-SUG-EDT-400-001`

        - `HTTP Status Code 400`, when the `suggestionId` path parameter exceeds 50 characters. Error code: `IIA-SUG-EDT-400-002`

        - `HTTP Status Code 400`, when the request body is missing. Error code: `IIA-SUG-EDT-400-003`

        - `HTTP Status Code 400`, when the request body is not a valid JSON serialization of schema `SuggestionTextPatchRequest`. Error code: `IIA-SUG-EDT-400-004`

        - `HTTP Status Code 400`, when none of `operatorAdvice`, `passengerMessage` or `operatorNote` is provided. Error code: `IIA-SUG-EDT-400-005`

        - `HTTP Status Code 404`, when no suggestion with the given `suggestionId` is found. Error code: `IIA-SUG-EDT-404-001`

        - `HTTP Status Code 500`, when an unexpected error occurs while updating suggestion texts. Error code: `IIA-SUG-EDT-500-001`
      operationId: patchSuggestionTexts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuggestionTextPatchRequest'
      responses:
        '200':
          description: Suggestion texts updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestionDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/UnexpectedError'
  /v1/suggestions/{suggestionId}/approve:
    parameters:
    - $ref: '#/components/parameters/XWtfProfile'
    - $ref: '#/components/parameters/SuggestionId'
    post:
      tags:
      - Suggestions
      summary: Approve a suggestion
      description: |
        Approves a suggestion currently in `TO_REVIEW`.

        Approval stores the final operator decision. If `passengerMessage` or `operatorAdvice` are supplied in the request, they are applied as last-minute edits before approval. If they are omitted, the current persisted texts are used.

        Target status: `APPROVED`.
        Invalid workflow transitions return HTTP `409`.

                ## Additional notes

        - This operation approves a suggestion currently in `TO_REVIEW`.

        - If `operatorAdvice` or `passengerMessage` are provided, they are applied as final edits before approval.

        - If `operatorAdvice` or `passengerMessage` are omitted, the current persisted texts are used.

        - Approval stores the operator action metadata and changes the suggestion status to `APPROVED`.

        - Approval does not automatically publish passenger-facing content unless a downstream implementation explicitly supports and controls that behavior.

        - Invalid workflow transitions return HTTP Status Code `409`.

        ## Errors

        Invalid parameters should raise an HTTP Status Code 400 according with the following list:

        - `HTTP Status Code 400`, when the `suggestionId` path parameter is empty or contains only whitespace characters. Error code: `IIA-SUG-APR-400-001`

        - `HTTP Status Code 400`, when the `suggestionId` path parameter exceeds 50 characters. Error code: `IIA-SUG-APR-400-002`

        - `HTTP Status Code 400`, when the request body is provided but is not a valid JSON serialization of schema `SuggestionApprovalRequest`. Error code: `IIA-SUG-APR-400-003`

        - `HTTP Status Code 404`, when no suggestion with the given `suggestionId` is found. Error code: `IIA-SUG-APR-404-001`

        - `HTTP Status Code 409`, when the suggestion status is not `TO_REVIEW`. Error code: `IIA-SUG-APR-409-001`

        - `HTTP Status Code 409`, when the suggestion has already been approved, rejected, expired or marked as error by another operator or process. Error code: `IIA-SUG-APR-409-002`

        - `HTTP Status Code 500`, when an unexpected error occurs while approving the suggestion. Error code: `IIA-SUG-APR-500-001`
      operationId: approveSuggestion
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuggestionApprovalRequest'
      responses:
        '200':
          description: Suggestion approved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestionDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/UnexpectedError'
  /v1/suggestions/{suggestionId}/reject:
    parameters:
    - $ref: '#/components/parameters/XWtfProfile'
    - $ref: '#/components/parameters/SuggestionId'
    post:
      tags:
      - Suggestions
      summary: Reject a suggestion
      description: |
        Rejects a suggestion currently in `TO_REVIEW` and stores an optional operator note.

        Target status: `REJECTED`.
        Invalid workflow transitions return HTTP `409`.


        ## Additional notes

        - This operation rejects a suggestion currently in `TO_REVIEW`.

        - Rejection stores the operator action metadata and changes the suggestion status to `REJECTED`.

        - `operatorNote` can be used to explain why the suggestion was rejected.

        - Rejected suggestions must remain available for audit and historical review.

        - Invalid workflow transitions return HTTP Status Code `409`.

        ## Errors

        Invalid parameters should raise an HTTP Status Code 400 according with the following list:

        - `HTTP Status Code 400`, when the `suggestionId` path parameter is empty or contains only whitespace characters. Error code: `IIA-SUG-REJ-400-001`

        - `HTTP Status Code 400`, when the `suggestionId` path parameter exceeds 50 characters. Error code: `IIA-SUG-REJ-400-002`

        - `HTTP Status Code 400`, when the request body is provided but is not a valid JSON serialization of schema `SuggestionRejectionRequest`. Error code: `IIA-SUG-REJ-400-003`


        - `HTTP Status Code 404`, when no suggestion with the given `suggestionId` is found. Error code: `IIA-SUG-REJ-404-001`

        - `HTTP Status Code 409`, when the suggestion status is not `TO_REVIEW`. Error code: `IIA-SUG-REJ-409-001`

        - `HTTP Status Code 409`, when the suggestion has already been approved, rejected, expired or marked as error by another operator or process. Error code: `IIA-SUG-REJ-409-002`

        - `HTTP Status Code 500`, when an unexpected error occurs while rejecting the suggestion. Error code: `IIA-SUG-REJ-500-001`
      operationId: rejectSuggestion
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuggestionRejectionRequest'
      responses:
        '200':
          description: Suggestion rejected successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestionDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/UnexpectedError'
  /v1/alerts:
    parameters:
    - $ref: '#/components/parameters/XWtfProfile'
    get:
      tags:
      - Alerts
      summary: Search alert definitions
      description: |
        Returns alert definitions configured by operators.

        This endpoint is intended for the future Alerts menu. It returns configuration and runtime metadata, not suggestion instances.

        ## Additional notes

        - This operation returns alert definitions configured by operators, not generated suggestion instances.

        - The `status`, `enabled` and `interpreterType` filters are exact-match filters.

        - The `text` filter is a partial-match filter over alert name and prompt.

        - Deleted alerts should not be returned unless the implementation explicitly supports an audit-oriented view.

        - Runtime metadata, when present, represents the last known execution state and must not be considered a real-time execution trace.

        ## Errors

        Invalid parameters should raise an HTTP Status Code 400 according with the following list:

        - `HTTP Status Code 400`, when the `status` query parameter is not a valid value of `AlertStatus`. Error code: `IIA-ALT-SEA-400-001`

        - `HTTP Status Code 400`, when the `enabled` query parameter is not a valid boolean value. Error code: `IIA-ALT-SEA-400-002`

        - `HTTP Status Code 400`, when the `interpreterType` query parameter is not a valid value of `AlertInterpreterType`. Error code: `IIA-ALT-SEA-400-003`

        - `HTTP Status Code 400`, when the `text` query parameter exceeds 200 characters. Error code: `IIA-ALT-SEA-400-004`

        - `HTTP Status Code 500`, when an unexpected error occurs while searching alert definitions. Error code: `IIA-ALT-SEA-500-001`
      operationId: searchAlerts
      parameters:
      - name: status
        in: query
        required: false
        description: Optional exact filter by alert lifecycle status.
        schema:
          $ref: '#/components/schemas/AlertStatus'
      - name: enabled
        in: query
        required: false
        description: Optional filter by enabled flag.
        schema:
          type: boolean
      - name: interpreterType
        in: query
        required: false
        description: Optional filter by interpreter type.
        schema:
          $ref: '#/components/schemas/AlertInterpreterType'
      - name: text
        in: query
        required: false
        description: Optional partial-match filter over alert name and prompt.
        schema:
          type: string
          maxLength: 200
          example: cancellazione senza annuncio
      responses:
        '200':
          description: Alert definitions returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertSummaryListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/UnexpectedError'
    post:
      tags:
      - Alerts
      summary: Create an alert definition
      description: |
        Creates an alert definition from a free-text operator prompt.

        The creation request does not expose `preferredInterpreterType` or `schedule`: the backend must derive the controlled interpretation from the prompt, the available tools contract and the verification flow.

        ## Creation behaviour

        - When `verifyImmediately = false` or is omitted, the backend only persists the alert. The returned alert has status `DRAFT`, is not enabled, has verification status `PENDING`, and does not expose interpreter metadata. The operator can start verification later through `POST /v1/alerts/{alertId}/verify`.

        - When `verifyImmediately = true`, the backend creates the alert with status `VERIFYING` and starts AI-assisted verification immediately. If verification completes during the request, the returned alert can already be `VERIFIED`, `REJECTED` or `ERROR`. If the implementation supports asynchronous verification, it can return the alert still in `VERIFYING`.

        - `enableAfterVerification` can enable the alert automatically only after successful verification. It must never enable a `DRAFT`, `VERIFYING`, `REJECTED` or `ERROR` alert.

        - A verified alert must expose controlled interpreter metadata only. The API must not expose arbitrary executable code.

        ## Errors

        Invalid parameters should raise an HTTP Status Code 400 according with the following list:

        - `HTTP Status Code 400`, when the request body is missing. Error code: `IIA-ALT-CRT-400-001`

        - `HTTP Status Code 400`, when the request body is not a valid JSON serialization of schema `AlertCreateRequest`. Error code: `IIA-ALT-CRT-400-002`

        - `HTTP Status Code 400`, when the `name` field is missing, empty or contains only whitespace characters. Error code: `IIA-ALT-CRT-400-003`

