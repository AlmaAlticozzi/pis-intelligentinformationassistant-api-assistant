  /v1/alerts/{alertId}/agent-generation-preview:
    parameters:
    - $ref: '#/components/parameters/XWtfProfile'
    - $ref: '#/components/parameters/AlertId'
    post:
      tags:
      - Alerts
      summary: Preview Agent generation for an alert
      description: |
        Produces an Agent generation preview for a verified Alert without creating an Agent definition.\n\nThe\
        \ operation asks the backend generation flow to transform the verified Alert interpretation into a structured Agent\
        \ Blueprint preview. The preview is used by the UI to show the operator what the system would create before the Agent\
        \ definition is persisted.\n\n```text\nVerified Alert\n    -> load latest verification result\n    -> build generation\
        \ prompt with allowed sources, tools and DSL functions\n    -> generate Agent Blueprint\n    -> validate Blueprint\n\
        \    -> estimate complexity and recommended generation mode\n    -> return preview to UI\n```\n\nThe response can\
        \ include a DSL preview when the Alert can be expressed through the controlled DSL. It can also report that the Agent\
        \ requires generated Java, that the request is not supported, or that clarification is required.\n\nNo Agent definition,\
        \ artifact or runtime object is created by this operation.\n\n## Errors\n\nInvalid parameters should raise an HTTP\
        \ Status Code 400 according with the following list:\n\n- `HTTP Status Code 400`, when the `alertId` path parameter\
        \ is empty or contains only whitespace characters. Error code: `IIA-ALT-AGP-400-001`\n\n- `HTTP Status Code 400`,\
        \ when the request body is provided but is not a valid JSON serialization of schema `AgentGenerationPreviewRequest`.\
        \ Error code: `IIA-ALT-AGP-400-002`\n\n- `HTTP Status Code 404`, when no alert with the given `alertId` is found.\
        \ Error code: `IIA-ALT-AGP-404-001`\n\n- `HTTP Status Code 409`, when the alert is not verified. Error code: `IIA-ALT-AGP-409-001`\n\
        \n- `HTTP Status Code 422`, when the verified alert cannot be transformed into an Agent Blueprint with the available\
        \ sources and tools. Error code: `IIA-ALT-AGP-422-001`\n\n- `HTTP Status Code 500`, when an unexpected error occurs\
        \ while generating the Agent preview. Error code: `IIA-ALT-AGP-500-001`\n

        ## Technical specification alignment

        The Agent generation preview is based on the latest backend-validated technical
        specification of the Alert. If the technical specification was manually replaced through
        `PUT /v1/alerts/{alertId}/technical-specification`, the preview must use the updated
        specification and not a stale blueprint generated before the manual edit.

        The Agent Blueprint preview is a derived artifact/cache. It must be regenerated, refreshed
        or realigned whenever the technical specification is replaced successfully.

        This operation must not treat a stale Agent Blueprint preview as a source of truth when it
        conflicts with the current technical specification.
      operationId: previewAgentGenerationForAlert
