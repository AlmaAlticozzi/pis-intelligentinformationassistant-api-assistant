    post:
      tags:
      - Agent Definitions
      summary: Create an Agent definition from a verified Alert
      description: |
        Creates an Agent definition from a verified Alert.

        This operation is the practical injection point between Alert verification and Agent runtime governance. The API does not receive executable code, Java source, scripts, SQL or a client-provided runtime artifact. It receives a request that selects the verified Alert, the desired Agent Profile, activation policy and generation mode. The backend then creates a persistent Agent Definition from the latest backend-validated technical specification and from a validated Blueprint/DSL preview.

        The technical source of truth is always read server-side from the Alert. The UI may provide name, description, profile, activation policy and generation preferences, but it must not provide arbitrary runtime logic.

        ```text
        POST /v1/agent-definitions
                -> validate request body
                -> load Alert server-side
                -> reject deleted / non VERIFIED / verificationStatus != VERIFIED
                -> validate requested alertVersion, or lock current num_version if omitted
                -> validate technicalSpecification as source of truth
                -> validate / regenerate / normalize Agent Blueprint readiness from technicalSpecification
                -> validate Agent Profile exists and is enabled
                -> validate Agent Profile compatibility with interpreterType, triggerType, schedule, stopPoints, complexity
                -> validate activation policy shape, timezone and temporal coherence
                -> derive runtimeContract from technicalSpecification + profile + activation policy
                -> persist Agent Definition bound to alertId + alertVersion
                -> else set definition DRAFT
                -> return AgentDefinitionDetail
        ```

        If `compileImmediately` is true, the response can already include a compilation status in `PENDING`, `VALIDATING_BLUEPRINT` or `GENERATING_ARTIFACT`. Runtime execution never starts from this operation. Activation requires `POST /v1/agent-definitions/{agentDefinitionId}/activate`.

        ## Errors

        Invalid parameters should raise an HTTP Status Code 400 according with the following list:

        - `HTTP Status Code 400`, when the request body is missing. Error code: `IIA-AGD-CRE-400-001`
        - `HTTP Status Code 400`, when the request body is not a valid JSON serialization of schema `AgentDefinitionCreateRequest`. Error code: `IIA-AGD-CRE-400-002`
        - `HTTP Status Code 400`, when the activation policy is not coherent with its declared type. Error code: `IIA-AGD-CRE-400-003`
        - `HTTP Status Code 404`, when the originating Alert or Agent Profile does not exist. Error code: `IIA-AGD-CRE-404-001`
        - `HTTP Status Code 409`, when the Alert is not VERIFIED, was deleted or the requested Alert version is no longer the current verified version. Error code: `IIA-AGD-CRE-409-001`
        - `HTTP Status Code 422`, when the verified Alert is missing technicalSpecification, the Blueprint is not ready for Agent Definition creation or the selected Agent Profile is not compatible with the technical specification. Error code: `IIA-AGD-CRE-422-001`
        - `HTTP Status Code 500`, when an unexpected error occurs while creating the Agent definition. Error code: `IIA-AGD-CRE-500-001`
      operationId: createAgentDefinition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentDefinitionCreateRequest'
      responses:
        '200':
          description: Agent definition created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDefinitionDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
