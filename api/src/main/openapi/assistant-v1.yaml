  /v1/agent-definitions/{agentDefinitionId}/compile:
    parameters:
    - $ref: '#/components/parameters/XWtfProfile'
    - $ref: '#/components/parameters/AgentDefinitionId'
    post:
      tags:
      - Agent Definitions
      summary: Compile an Agent definition
      description: |
        Starts or restarts the controlled Agent compilation pipeline.

        Compilation means transforming the validated Agent Definition into a versioned runtime artifact that the Agent Orchestrator can load. In the primary MVP path the artifact is a backend-generated DSL document interpreted by a standard runtime evaluator. A generated Java artifact is a future advanced option and must only be produced from approved templates after static analysis, tests, hashing and signing.

        Compilation is the runtime-compatibility gate between Alert Verify and execution. It must fail if the technical specification contains fields, operators, node types, schedules or access modes that are not supported by the target runtime or by the selected Agent Profile.

        ```text
        Agent Definition
            -> Agent Compiler
            -> read verified technicalSpecification
            -> validate Blueprint and DSL readiness
            -> validate field/operator/runtime compatibility
            -> validate Agent Profile limits
            -> generate controlled DSL artifact
            -> optional static analysis / simulation
            -> hash and sign artifact
            -> update Agent Definition status to READY or REJECTED
        ```

        The Agent Orchestrator never compiles code. It only loads artifacts that have already passed this pipeline.

        ## Errors

        - `HTTP Status Code 400`, when the request body is provided but is not a valid JSON serialization of schema `AgentCompilationRequest`. Error code: `IIA-AGD-CMP-400-001`
        - `HTTP Status Code 404`, when no Agent definition with the given identifier is found. Error code: `IIA-AGD-CMP-404-001`
        - `HTTP Status Code 409`, when the Agent definition is already active or another compilation is already running. Error code: `IIA-AGD-CMP-409-001`
        - `HTTP Status Code 422`, when the definition cannot be compiled because the Alert verification is incomplete, the DSL is not runtime-compatible or the selected Agent Profile cannot host the specification. Error code: `IIA-AGD-CMP-422-001`
        - `HTTP Status Code 500`, when an unexpected error occurs while starting Agent compilation. Error code: `IIA-AGD-CMP-500-001`
      operationId: compileAgentDefinition
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCompilationRequest'
      responses:
        '200':
          description: Agent compilation started successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCompilationStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/UnexpectedError'
