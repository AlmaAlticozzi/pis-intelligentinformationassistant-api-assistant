        deduplicationKey:
          type: string
        validationErrorCode:
          type: string
        validationErrorMessage:
          type: string
        suggestionId:
          type: string
          maxLength: 50
        rawOutput:
          type: object
          additionalProperties: true
        generatedAt:
          type: string
          format: date-time
        processedAt:
          type: string
          format: date-time
    AgentRunKillRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 1000
        force:
          type: boolean
          default: false
        gracePeriodSeconds:
          type: integer
          minimum: 0
          maximum: 600
          default: 60
    AgentRunRestartRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 1000
        force:
          type: boolean
          default: false
    AgentRunLogListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AgentRunLogEntry'
        externalLogUrl:
          type: string
          nullable: true
    AgentRunLogEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          enum:
          - TRACE
          - DEBUG
          - INFO
          - WARN
          - ERROR
        message:
          type: string
        logger:
          type: string
    AgentDefinitionStatus:
      type: string
      enum:
      - DRAFT
      - COMPILATION_PENDING
      - COMPILING
      - READY
      - ACTIVE
      - DISABLED
      - SUPERSEDED
      - REJECTED
      - ARCHIVED
    AgentCompilationStatus:
      type: string
      enum:
      - PENDING
      - GENERATING_BLUEPRINT
      - VALIDATING_BLUEPRINT
      - GENERATING_ARTIFACT
      - STATIC_ANALYSIS
      - COMPILING
      - TESTING
      - SIMULATING
      - SIGNING
      - READY
      - FAILED
      - REJECTED
    AgentGenerationMode:
      type: string
      enum:
      - AUTO
      - DSL
      - JAVA_TEMPLATE
      description: Requested generation mode. DSL is the primary governed runtime mode. JAVA_TEMPLATE is reserved for a future
        advanced path based only on approved templates, never arbitrary LLM-generated code.
    AgentArtifactType:
      type: string
      enum:
      - NONE
      - DSL
      - JAVA_JAR
      description: Type of validated artifact generated by the compilation pipeline. DSL is the primary runtime artifact for
        the MVP.
    AgentComplexity:
      type: string
      enum:
      - LOW
      - MEDIUM
      - HIGH
      - UNSUPPORTED
    AgentDataSource:
      type: string
      enum:
      - SERVICE_DATA
      - MONITORED_AUDIO_MESSAGE
      - ANNOUNCEMENT
      - BROADCAST
      - CONTENT
      - DEVICE
      - CONFIGURATION
      - JOURNEY
      - OTHER
    AgentRunStatus:
      type: string
      enum:
      - PENDING
      - STARTING
      - RUNNING
      - IDLE
      - DEGRADED
      - STOPPING
      - STOPPED
      - FAILED
      - KILLED
      - EXPIRED
    AgentHealthStatus:
      type: string
      enum:
      - HEALTHY
      - DEGRADED
      - UNRESPONSIVE
      - FAILED
      - UNKNOWN
    AgentQualityStatus:
      type: string
      enum:
      - UNKNOWN
      - GOOD
      - WARNING
      - POOR
    AgentOutputStatus:
      type: string
      enum:
      - RECEIVED
      - VALIDATING
      - VALID
      - INVALID_SCHEMA
      - REJECTED_BY_POLICY
      - DUPLICATED
      - LOW_CONFIDENCE
      - SUGGESTION_CREATED
      - SUGGESTION_MERGED
      - FAILED
    AgentRuntimeEventType:
      type: string
      enum:
      - AGENT_STARTED
      - AGENT_READY
      - AGENT_HEARTBEAT
      - AGENT_STOP_REQUESTED
      - AGENT_STOPPED
      - AGENT_FAILED
      - AGENT_KILLED
      - AGENT_EXPIRED
      - AGENT_DEGRADED
      - AGENT_RECOVERED
      - ARTIFACT_LOADED
      - ARTIFACT_VALIDATION_FAILED
      - OUTPUT_GENERATED
      - OUTPUT_REJECTED
      - STATE_STORE_ERROR
      - TOOL_GATEWAY_ERROR
      - RESOURCE_LIMIT_WARNING
    AgentRuntimeEventSeverity:
      type: string
      enum:
      - INFO
      - WARNING
      - ERROR
      - CRITICAL
    DayOfWeek:
      type: string
      enum:
      - MONDAY
      - TUESDAY
      - WEDNESDAY
      - THURSDAY
      - FRIDAY
      - SATURDAY
      - SUNDAY
    AgentRuntimeRef:
      type: object
      description: Logical runtime reference assigned by the Agent Orchestrator. This is the canonical runtime identity in
        the shared-runtime model. Kubernetes metadata, when present, is optional diagnostic information.
      properties:
        orchestratorInstanceId:
          type: string
          example: iia-agentorchestrator-0
        runtimeClass:
          type: string
          example: STANDARD_DSL_RUNTIME
        runtimeMode:
          type: string
          enum:
          - SHARED_RUNTIME
          - DEDICATED_WORKLOAD
          - EXTERNAL_RUNTIME
          example: SHARED_RUNTIME
        assignmentId:
          type: string
          example: ASG-AGDF2026251400000001-001
        loadedArtifactHash:
          type: string
          example: sha256:5f2b6c...
        loadedAt:
          type: string
          format: date-time
        lastSyncAt:
          type: string
          format: date-time
security:
- bearerAuth: []
