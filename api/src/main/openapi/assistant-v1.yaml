        agentRunId:
          type: string
          maxLength: 50
        agentDefinitionId:
          type: string
          maxLength: 50
        alert:
          $ref: '#/components/schemas/AlertReference'
        alertVersion:
          type: integer
          format: int32
        status:
          $ref: '#/components/schemas/AgentOutputStatus'
        outputType:
          type: string
