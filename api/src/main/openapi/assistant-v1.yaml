          format: date-time
        resources:
          $ref: '#/components/schemas/AgentResourceUsage'
        processedEvents:
          type: integer
          format: int64
        generatedOutputs:
          type: integer
          format: int64
        invalidOutputs:
          type: integer
          format: int64
        errorsCount:
          type: integer
          format: int64
    AgentRuntimeEventListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AgentRuntimeEvent'
    AgentRuntimeEvent:
      type: object
      required:
      - id
      - eventType
      - agentRunId
