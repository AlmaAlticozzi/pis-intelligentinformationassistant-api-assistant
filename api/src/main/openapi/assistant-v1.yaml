        - `HTTP Status Code 400`, when the `alertId` path parameter exceeds 50 characters. Error code: `IIA-ALT-DEL-400-002`

        - `HTTP Status Code 401`, when the request is not authenticated. Error code: `IIA-ALT-DEL-401-001`

        - `HTTP Status Code 403`, when the authenticated user is not allowed to delete alert definitions. Error code: `IIA-ALT-DEL-403-001`

        - `HTTP Status Code 404`, when no alert with the given `alertId` is found. Error code: `IIA-ALT-DEL-404-001`

        - `HTTP Status Code 409`, when the alert is already deleted. Error code: `IIA-ALT-DEL-409-001`

