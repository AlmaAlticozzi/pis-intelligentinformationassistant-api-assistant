        name:
          type: string
          maxLength: 120
        description:
          type: string
          maxLength: 1000
        status:
          $ref: '#/components/schemas/AgentDefinitionStatus'
        alert:
          $ref: '#/components/schemas/AlertReference'
        alertVersion:
          type: integer
          format: int32
        profile:
          $ref: '#/components/schemas/AgentProfile'
        generationMode:
          $ref: '#/components/schemas/AgentGenerationMode'
        activationPolicy:
          $ref: '#/components/schemas/AgentActivationPolicy'
        blueprint:
          $ref: '#/components/schemas/AgentBlueprint'
        artifact:
          $ref: '#/components/schemas/AgentArtifact'
        compilation:
          $ref: '#/components/schemas/AgentCompilationStatusResponse'
        runtimeContract:
          $ref: '#/components/schemas/AgentRuntimeContract'
        latestRun:
          $ref: '#/components/schemas/AgentRunSummary'
        createdBy:
          type: string
          example: m.user
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        interpreterType:
          $ref: '#/components/schemas/AlertInterpreterType'
        triggerType:
          type: string
          enum:
          - EVENT
          - SCHEDULE
          description: Trigger type derived from the source Alert technicalSpecification. EVENT definitions are evaluated
            on incoming events; SCHEDULE definitions are evaluated by scheduled polling/snapshot logic.
        inputModel:
          type: string
          example: ServiceDataV2
          description: Input model required by the runtime artifact, derived from the technicalSpecification.
        outputModel:
          type: string
          example: AgentOutput.CANDIDATE_SUGGESTION
          description: Output model produced by the runtime artifact.
    AgentDefinitionCreateRequest:
      type: object
      required:
      - alertId
      - agentProfileId
      - activationPolicy
      properties:
        alertId:
          type: string
          maxLength: 50
          description: Identifier of the VERIFIED Alert from which the Agent Definition must be created. This is the source
            Alert; runtime logic is read server-side from its current technicalSpecification.
        alertVersion:
          type: integer
          format: int32
          description: Expected Alert version. When omitted, backend uses latest verified version.
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 1000
        agentProfileId:
          type: string
          maxLength: 50
          example: MEDIUM
          description: Runtime governance profile to associate with the new Agent Definition. The backend validates that the
            profile exists, is enabled and is compatible with the technical specification.
        activationPolicy:
          $ref: '#/components/schemas/AgentActivationPolicy'
        generationMode:
          $ref: '#/components/schemas/AgentGenerationMode'
        compileImmediately:
          type: boolean
          default: true
          description: If true, the backend starts the controlled compilation pipeline after creating the Agent Definition.
            Compilation still does not start runtime execution.
      description: |-
        Request used to create a persistent Agent Definition from an already VERIFIED Alert.

        The request does not carry executable code or a client-provided DSL artifact. The backend reads the current Alert technicalSpecification and validated Agent Blueprint server-side, then stores a versioned definition bound to the requested Alert version and Agent Profile.
    AgentDefinitionPatchRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 1000
        agentProfileId:
          type: string
          maxLength: 50
        activationPolicy:
          $ref: '#/components/schemas/AgentActivationPolicy'
    AgentCompilationRequest:
      type: object
      properties:
        force:
          type: boolean
          default: false
        generationMode:
          $ref: '#/components/schemas/AgentGenerationMode'
        runSimulation:
          type: boolean
          default: true
        note:
          type: string
          maxLength: 1000
      description: Request used to start or restart controlled Agent compilation. Compilation verifies runtime compatibility
        and produces a controlled artifact; it does not execute the Agent.
    AgentActivationRequest:
      type: object
      properties:
        note:
          type: string
          maxLength: 1000
          description: Optional operator or control-plane note propagated as non-authoritative submission metadata.
        startImmediatelyIfAllowed:
          type: boolean
          default: true
          description: Requests immediate runtime eligibility when allowed by the activation policy. It never bypasses validFrom, validTo, daily windows or other runtime governance checks.
      description: |
        Optional command body used when activating a `READY` or `DISABLED` Agent Definition. When the body is omitted, `startImmediatelyIfAllowed` defaults to `true`. The command does not execute code inside the Assistant API and the local status becomes `ACTIVE` only after successful Agent Orchestrator acceptance.
    AgentDisableRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 1000
          description: Optional operator or control-plane reason recorded for lifecycle audit and propagated to the Agent Orchestrator when runtime disable is required.
        stopRunningAgents:
          type: boolean
          default: true
          description: Requests graceful termination of active Agent Runs associated with the runtime definition. It has no effect on a local `READY -> DISABLED` transition because no runtime definition has been accepted yet.
        gracePeriodSeconds:
          type: integer
          minimum: 0
          maximum: 600
          default: 60
          description: Maximum graceful-stop interval requested from the Agent Orchestrator. A value of zero requests no graceful wait; runtime policy still governs the final interruption behavior.
      description: |
        Optional command body used to disable an Agent Definition. When omitted, `stopRunningAgents` defaults to `true` and `gracePeriodSeconds` defaults to `60`. The command is idempotent for definitions already in `DISABLED`.
    AgentCompilationStatusResponse:
      type: object
      required:
      - agentDefinitionId
      - status
      properties:
        agentDefinitionId:
          type: string
          maxLength: 50
        status:
          $ref: '#/components/schemas/AgentCompilationStatus'
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        currentStep:
          type: string
          example: STATIC_ANALYSIS
        steps:
          type: array
          items:
            $ref: '#/components/schemas/AgentCompilationStep'
        artifact:
          $ref: '#/components/schemas/AgentArtifact'
        errors:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
    AgentCompilationSummary:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/AgentCompilationStatus'
        currentStep:
          type: string
        completedAt:
          type: string
          format: date-time
    AgentCompilationStep:
      type: object
      properties:
        name:
          type: string
          example: STATIC_ANALYSIS
        status:
          type: string
          enum:
          - PENDING
          - RUNNING
          - SUCCESS
          - FAILED
          - SKIPPED
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        message:
          type: string
    AgentBlueprint:
      type: object
      description: |
        Derived Agent Blueprint preview generated from a verified Alert technical specification.
        It is not executable code and it is not the primary source of truth.

        The source of truth for Alert interpretation is the backend-validated technical specification.
        This blueprint is a generation-oriented view used by the Agent generation preview and future
        Agent Definition creation flows.
      additionalProperties: true
      properties:
        agentName:
          type: string
          example: CancelledMetroTrainsAtIonioAgent
        description:
          type: string
        triggerType:
          type: string
          enum:
          - EVENT
          - SCHEDULE
          - SCHEDULED
          description: Trigger type proposed for the future Agent. EVENT is used for realtime event evaluation; SCHEDULE is
            used for scheduled snapshot evaluation. SCHEDULED is kept only as a backward-compatible legacy value.
        requiredSources:
          type: array
          items:
            $ref: '#/components/schemas/AgentDataSource'
        targetTypes:
          type: array
          items:
            $ref: '#/components/schemas/SuggestionTargetType'
        parameters:
          type: object
          additionalProperties: true
        stateRequirements:
          type: object
          additionalProperties: true
        suggestionIntent:
          type: object
          additionalProperties: true
    AgentDslPreview:
      type: object
      description: Preview of the controlled DSL generated for the Agent. It is intended for diagnostics and governance, not
        for direct editing by the UI.
      properties:
        schemaVersion:
          type: string
          example: iia.agent.dsl/v1
        summary:
          type: string
        dsl:
          type: string
          description: Sanitized DSL text preview.
        supportedByRuntime:
          type: boolean
          example: true
    AgentValidationPlan:
      type: object
      properties:
        positiveExamples:
          type: array
          items:
            $ref: '#/components/schemas/AgentValidationExample'
        negativeExamples:
          type: array
          items:
            $ref: '#/components/schemas/AgentValidationExample'
        edgeCases:
          type: array
          items:
            type: string
    AgentValidationExample:
      type: object
      properties:
        description:
          type: string
        expectedOutput:
          type: string
          enum:
          - CANDIDATE_SUGGESTION
          - NO_OUTPUT
          - ERROR
    AgentArtifact:
      type: object
      description: |-
        Metadata of the validated Agent artifact. Raw executable code is not exposed by the API.

        For the primary MVP path the artifact is a controlled DSL document interpreted by the standard Agent Orchestrator runtime. A Java artifact, if ever enabled, must be generated only from approved templates and pass the compilation pipeline.
      properties:
        artifactType:
          $ref: '#/components/schemas/AgentArtifactType'
        artifactUri:
          type: string
          readOnly: true
          example: iia-agent-artifact://agent-def-123/rule.yaml
        artifactHash:
          type: string
          example: sha256:5f2b6c...
        signatureStatus:
          type: string
          enum:
          - NOT_SIGNED
          - SIGNED
          - INVALID
          - EXPIRED
          example: SIGNED
        runtimeImage:
          type: string
          example: pis-intelligentinformationassistant-agent-runtime:1.0.0
          description: Logical or physical runtime image expected to load the artifact. In a shared orchestrator model this
            may identify the standard Agent Runtime image rather than a per-Agent container.
        sdkVersion:
          type: string
          example: 1.0.0
        implementationSummary:
          type: string
    AgentRuntimeContract:
      type: object
      properties:
        runtimeImage:
          type: string
        sdkVersion:
          type: string
        inputModel:
          type: string
          example: ServiceDataV2
        outputModel:
          type: string
          example: AgentOutput.CANDIDATE_SUGGESTION
        allowedTools:
          type: array
          items:
            $ref: '#/components/schemas/ToolReference'
        networkPolicy:
          type: string
          example: TOOL_GATEWAY_ONLY
          description: Runtime network policy enforced by the Agent Orchestrator for this Agent Definition.
        runtimeExecutionModel:
          type: string
          enum:
          - STANDARD_DSL_EVALUATOR
          - APPROVED_TEMPLATE_RUNTIME
          description: Execution model expected by the Agent Orchestrator. The primary MVP value is STANDARD_DSL_EVALUATOR.
          example: STANDARD_DSL_EVALUATOR
        interpreterType:
          $ref: '#/components/schemas/AlertInterpreterType'
        triggerType:
          type: string
          enum:
          - EVENT
          - SCHEDULE
          description: Runtime trigger type supported by the artifact.
        evaluationMode:
          type: string
          description: 'Evaluation mode required by the runtime artifact. Examples: STATELESS_EVENT_MATCH, SCHEDULED_SNAPSHOT_MATCH.'
          example: STATELESS_EVENT_MATCH
        requiredOperators:
          type: array
          description: Operators that must be implemented by the runtime DSL evaluator in order to load this artifact.
          items:
            type: string
          example:
          - CONTAINS
          - IN
          - EQUAL_PLATFORM
        forbiddenCapabilities:
          type: array
          description: Capabilities explicitly forbidden for this runtime contract, such as external HTTP, DB query, filesystem,
            shell or arbitrary code execution.
          items:
            type: string
          example:
          - ARBITRARY_CODE_EXECUTION
          - EXTERNAL_HTTP
          - DB_QUERY
          - FILESYSTEM
        orchestratorCompatibility:
          type: object
          description: Optional runtime compatibility metadata used by the Agent Orchestrator.
          additionalProperties: true
          example:
            minimumRuntimeVersion: 1.0.0
            runtimeClass: STANDARD_DSL_RUNTIME
      description: |-
        Runtime contract generated by the backend for an Agent Definition.

        It declares how the Agent Orchestrator may load and evaluate the controlled artifact. It is a governance contract, not executable code.
    AgentActivationPolicy:
      oneOf:
      - $ref: '#/components/schemas/AgentContinuousActivationPolicy'
      - $ref: '#/components/schemas/AgentDailyWindowActivationPolicy'
      discriminator:
        propertyName: type
        mapping:
          CONTINUOUS: '#/components/schemas/AgentContinuousActivationPolicy'
          DAILY_WINDOW: '#/components/schemas/AgentDailyWindowActivationPolicy'
    AgentContinuousActivationPolicy:
      type: object
      required:
      - type
      - timezone
      - validFrom
      - validTo
      properties:
        type:
          type: string
          enum:
          - CONTINUOUS
        timezone:
          type: string
          example: Europe/Rome
        validFrom:
          type: string
          format: date-time
          description: Local validity start expressed with timezone offset.
        validTo:
          type: string
          format: date-time
          description: Local validity end expressed with timezone offset.
    AgentDailyWindowActivationPolicy:
      type: object
      required:
      - type
      - timezone
      - validFromDate
      - validToDate
      - dailyStartTime
      - dailyEndTime
      properties:
        type:
          type: string
          enum:
          - DAILY_WINDOW
        timezone:
          type: string
          example: Europe/Rome
        validFromDate:
          type: string
          format: date
        validToDate:
          type: string
          format: date
        dailyStartTime:
          type: string
          pattern: ^([01]\d|2[0-3]):[0-5]\d(:[0-5]\d)?$
          example: 07:00:00
        dailyEndTime:
          type: string
          pattern: ^([01]\d|2[0-3]):[0-5]\d(:[0-5]\d)?$
          example: '10:30:00'
        daysOfWeek:
          type: array
          items:
            $ref: '#/components/schemas/DayOfWeek'
          example:
          - MONDAY
          - TUESDAY
          - WEDNESDAY
          - THURSDAY
          - FRIDAY
    AgentRunListResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AgentRunSummary'
    AgentRunSummary:
      type: object
      required:
      - id
      - agentDefinitionId
      - status
      - startedAt
      properties:
        id:
          type: string
          maxLength: 50
          example: AGRN2026251400000001
        agentDefinitionId:
          type: string
          maxLength: 50
        agentName:
          type: string
        alert:
          $ref: '#/components/schemas/AlertReference'
        status:
          $ref: '#/components/schemas/AgentRunStatus'
        healthStatus:
          $ref: '#/components/schemas/AgentHealthStatus'
        healthScore:
          type: integer
          minimum: 0
          maximum: 100
          example: 74
        qualityStatus:
          $ref: '#/components/schemas/AgentQualityStatus'
        qualityScore:
          type: integer
          minimum: 0
          maximum: 100
          example: 82
        profileId:
          type: string
          example: MEDIUM
        cpuUsagePercent:
          type: number
          format: double
          example: 42.0
        memoryUsagePercent:
          type: number
          format: double
          example: 68.0
        generatedOutputs:
          type: integer
          format: int64
          example: 38
        createdSuggestions:
          type: integer
          format: int64
          example: 24
        lastHeartbeatAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        stoppedAt:
          type: string
          format: date-time
        runtime:
          $ref: '#/components/schemas/AgentRuntimeRef'
    AgentRunDetail:
      type: object
      required:
      - id
      - agentDefinition
      - status
      properties:
        id:
          type: string
          maxLength: 50
        agentDefinition:
          $ref: '#/components/schemas/AgentDefinitionSummary'
        status:
          $ref: '#/components/schemas/AgentRunStatus'
        healthStatus:
          $ref: '#/components/schemas/AgentHealthStatus'
        healthScore:
          type: integer
          minimum: 0
          maximum: 100
        qualityStatus:
          $ref: '#/components/schemas/AgentQualityStatus'
        qualityScore:
          type: integer
          minimum: 0
          maximum: 100
        mainIssues:
          type: array
          items:
            type: string
        kubernetes:
          $ref: '#/components/schemas/AgentKubernetesRuntimeRef'
        resources:
          $ref: '#/components/schemas/AgentResourceUsage'
        functionalMetrics:
          $ref: '#/components/schemas/AgentFunctionalMetrics'
        latestEvents:
          type: array
          items:
            $ref: '#/components/schemas/AgentRuntimeEvent'
        startedAt:
          type: string
          format: date-time
        stoppedAt:
          type: string
          format: date-time
        lastHeartbeatAt:
          type: string
          format: date-time
        lastErrorAt:
          type: string
          format: date-time
        lastErrorCode:
          type: string
        lastErrorMessage:
          type: string
        runtime:
          $ref: '#/components/schemas/AgentRuntimeRef'
    AgentKubernetesRuntimeRef:
      type: object
      properties:
        namespace:
          type: string
          example: pis-iia-agents
        resourceKind:
          type: string
          enum:
          - POD
          - JOB
          - DEPLOYMENT
          - CRONJOB
        resourceName:
          type: string
        podName:
          type: string
        containerImage:
          type: string
        podPhase:
          type: string
          example: Running
        containerState:
          type: string
          example: running
        restartCount:
          type: integer
          example: 1
        nodeName:
          type: string
      description: Optional Kubernetes diagnostic reference for runtimes backed by Kubernetes workloads. This object is not
        the canonical execution model and can be absent when the Agent is loaded into a shared Agent Orchestrator runtime.
    AgentResourceUsage:
      type: object
      properties:
        cpuMillicores:
          type: number
          format: double
        cpuRequestMillicores:
          type: integer
        cpuLimitMillicores:
          type: integer
        cpuUsagePercent:
          type: number
          format: double
        memoryBytes:
          type: integer
          format: int64
        memoryLimitBytes:
          type: integer
          format: int64
        memoryUsagePercent:
          type: number
          format: double
        networkRxBytes:
          type: integer
          format: int64
        networkTxBytes:
          type: integer
          format: int64
    AgentFunctionalMetrics:
      type: object
      properties:
        processedEvents:
          type: integer
          format: int64
        candidateOutputs:
          type: integer
          format: int64
        validOutputs:
          type: integer
          format: int64
        discardedOutputs:
          type: integer
          format: int64
        deduplicatedOutputs:
          type: integer
          format: int64
        createdSuggestions:
          type: integer
          format: int64
        approvedSuggestions:
          type: integer
          format: int64
        rejectedSuggestions:
          type: integer
          format: int64
        modifiedSuggestions:
          type: integer
          format: int64
        averageConfidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
        approvalRate:
