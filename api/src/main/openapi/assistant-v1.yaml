        - `HTTP Status Code 404`, when no Agent definition or compilation state is found for the given identifier. Error code: `IIA-AGD-CMS-404-001`

        - `HTTP Status Code 500`, when an unexpected error occurs while reading Agent compilation status. Error code: `IIA-AGD-CMS-500-001`
      operationId: getAgentCompilationStatus
