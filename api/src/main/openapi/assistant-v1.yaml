  /v1/assistant/questions:
    parameters:
    - $ref: '#/components/parameters/XWtfProfile'
    post:
      tags:
      - Assistant
      summary: Ask a natural-language operational question
      description: |
        Sends an operator question to the Intelligent Information Assistant.

        The request intentionally requires only `question`. The UI is not required to provide `stopPointId`, selected journey, time window or any operational identifier.

        ## Execution flow

        ```text
        Question
          -> create/resume session
          -> store user message
          -> resolve intent and entities
          -> build validated tool plan
          -> execute domain tools
          -> build verified context
          -> optionally call LLM for formatting
          -> store answer and tool traces
          -> return answer and structured items
        ```

        ## Examples

        - `Quali corse partono da Torino alle 13?`
        - `La corsa AV 304 è in ritardo?`
        - `Che annunci hai fatto per la corsa AV 304 oggi?`
        - `Perché non è stato annunciato il ritardo della corsa AV 304?`

        Unsupported questions return HTTP `422` or a response with status `UNSUPPORTED`, depending on whether the request can still be represented as an assistant answer.

        ## Additional notes

        - This operation sends an operator natural-language question to the Intelligent Information Assistant.

        - The UI is required to provide only `question`.

        - The UI is not required to provide `stopPointId`, selected journey, time window or operational identifiers.

        - When `sessionId` is omitted, the backend creates a new assistant session automatically.

        - When `sessionId` is provided, the question is appended to the existing session and can use previous conversational context.

        - `uiContext` is optional and must never be the only source of truth for operational data.

        - Operational facts must be retrieved through controlled Moova domain tools and must not be invented by the assistant.

        - `includeItems = true` asks the backend to return structured answer items when available.

        - `includeToolExecutions = true` returns compact tool execution summaries only. Full sanitized traces remain available through the diagnostics endpoint.

        - Unsupported questions can return HTTP Status Code `422` or a response with status `UNSUPPORTED`, depending on whether the request can still be represented as an assistant answer.

        ## Errors

        Invalid parameters should raise an HTTP Status Code 400 according with the following list:

        - `HTTP Status Code 400`, when the request body is missing. Error code: `IIA-AST-ASK-400-001`

        - `HTTP Status Code 400`, when the request body is not a valid JSON serialization of schema `AssistantQuestionRequest`. Error code: `IIA-AST-ASK-400-002`

        - `HTTP Status Code 400`, when the `question` field is missing, empty or contains only whitespace characters. Error code: `IIA-AST-ASK-400-003`

        - `HTTP Status Code 400`, when the `question` field exceeds 2000 characters. Error code: `IIA-AST-ASK-400-004`

        - `HTTP Status Code 400`, when the `sessionId` field exceeds 50 characters. Error code: `IIA-AST-ASK-400-005`

        - `HTTP Status Code 400`, when the `preferredLanguage` field is not supported by the implementation. Error code: `IIA-AST-ASK-400-006`

        - `HTTP Status Code 400`, when the `uiContext` field contains unsupported, unsafe or non-serializable values. Error code: `IIA-AST-ASK-400-007`

        - `HTTP Status Code 404`, when `sessionId` is provided and no assistant session with the given `sessionId` is found. Error code: `IIA-AST-ASK-404-001`

        - `HTTP Status Code 409`, when `sessionId` is provided and the session is closed or cannot accept new questions. Error code: `IIA-AST-ASK-409-001`

        - `HTTP Status Code 422`, when the question is outside the supported operational scope of the assistant. Error code: `IIA-AST-ASK-422-001`

        - `HTTP Status Code 422`, when the question requires operational data sources that are not available through the Assistant Tools Layer. Error code: `IIA-AST-ASK-422-002`

        - `HTTP Status Code 422`, when the question cannot be answered safely because the intent or required entities are ambiguous and cannot be represented as a clarification response. Error code: `IIA-AST-ASK-422-003`

        - `HTTP Status Code 500`, when an unexpected error occurs while processing the assistant question. Error code: `IIA-AST-ASK-500-001`

        - `HTTP Status Code 503`, when the LLM provider or one or more required domain tools are temporarily unavailable. Error code: `IIA-AST-ASK-503-001`
      operationId: askAssistantQuestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssistantQuestionRequest'
      responses:
        '200':
          description: Question processed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantQuestionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
