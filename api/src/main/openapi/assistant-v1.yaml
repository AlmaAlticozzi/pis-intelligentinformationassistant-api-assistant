    post:
      tags:
      - Alerts
      summary: Re-run alert verification
      description: |
        Re-runs the AI-assisted alert verification flow. The backend derives interpreter type and runtime interpretation from the stored prompt and the available tools contract; the request body does not accept interpreter or schedule steering fields.

        Use this operation after editing a prompt, after a rejected verification, or when the available tool/model contract has changed.

        ## Additional notes

        - This operation re-runs the AI-assisted alert verification flow.

        - Use this operation after editing a prompt, after a rejected verification or when the available tool/model contract has changed.

        - If `force = false`, the backend may skip re-verification for an already verified alert whose prompt and verification contract did not change.

        - If `force = true`, the backend must re-run verification even if the alert is already verified.

        - Verification can update the alert status, verification metadata, interpreter metadata, required data and runtime deployment state.

        - Verification must not expose arbitrary executable code through the API.
        - A successful verification recalculates the technical specification from the stored natural-language prompt and from the current controlled verification contract.
        - A successful verification replaces any manually edited technical specification and resets `technicalSpecificationEdited` to `false`.
        - Verification also refreshes the Agent Blueprint preview as a derived artifact aligned with the newly validated technical specification.
        - Verification must not preserve a previous manually edited technical specification when the prompt is reinterpreted.

        ## Errors

        Invalid parameters should raise an HTTP Status Code 400 according with the following list:

        - `HTTP Status Code 400`, when the `alertId` path parameter is empty or contains only whitespace characters. Error code: `IIA-ALT-VER-400-001`

        - `HTTP Status Code 400`, when the `alertId` path parameter exceeds 50 characters. Error code: `IIA-ALT-VER-400-002`

        - `HTTP Status Code 400`, when the request body is provided but is not a valid JSON serialization of schema `AlertVerificationRequest`. Error code: `IIA-ALT-VER-400-003`

        - `HTTP Status Code 404`, when no alert with the given `alertId` is found. Error code: `IIA-ALT-VER-404-001`

        - `HTTP Status Code 409`, when the alert is deleted and cannot be verified. Error code: `IIA-ALT-VER-409-001`

        - `HTTP Status Code 409`, when the alert is already verifying or deploying and a concurrent verification cannot be started. Error code: `IIA-ALT-VER-409-002`

        - `HTTP Status Code 422`, when the alert prompt cannot be transformed into a controlled interpreter because it is ambiguous, unsafe or unsupported by available tools. Error code: `IIA-ALT-VER-422-001`

        - `HTTP Status Code 422`, when the alert prompt requires operational data sources that are not available through the Assistant Tools Layer. Error code: `IIA-ALT-VER-422-002`

        - `HTTP Status Code 500`, when an unexpected error occurs while verifying the alert. Error code: `IIA-ALT-VER-500-001`

        - `HTTP Status Code 503`, when the verification service, LLM provider or required backend tool is temporarily unavailable. Error code: `IIA-ALT-VER-503-001`
