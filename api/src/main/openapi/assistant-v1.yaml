      description: |
        Returns the latest application log lines or log references for one Agent Run.

        The endpoint is intended for troubleshooting from the Agent Monitor detail view. Implementations can return stored log excerpts, links to a centralized log platform, or both. Logs must not expose secrets, raw credentials, bearer tokens or uncontrolled payload dumps.

        ## Errors

        - `HTTP Status Code 404`, when no Agent run with the given identifier is found. Error code: `IIA-AGR-LOG-404-001`

        - `HTTP Status Code 500`, when an unexpected error occurs while reading Agent logs. Error code: `IIA-AGR-LOG-500-001`
      operationId: getAgentRunLogs
      parameters:
      - name: limit
        in: query
        required: false
        description: Maximum number of log entries.
        schema:
          type: integer
          minimum: 1
          maximum: 500
          default: 100
      responses:
        '200':
          description: Agent run logs returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRunLogListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/UnexpectedError'
  /v1/agent-outputs/{agentOutputId}:
    parameters:
    - $ref: '#/components/parameters/XWtfProfile'
    - $ref: '#/components/parameters/AgentOutputId'
    get:
      tags:
      - Agent Outputs
      summary: Get Agent output detail
      description: |
        Returns the complete Agent Output detail.

        The response includes raw normalized output fields, validation status, policy status, deduplication key, linked Suggestion and validation errors. It is intended for diagnostics and for explaining why an Agent produced or did not produce an operator-facing Suggestion.

        ## Errors

        - `HTTP Status Code 400`, when the `agentOutputId` path parameter is empty or contains only whitespace characters. Error code: `IIA-AGO-GET-400-001`

        - `HTTP Status Code 404`, when no Agent output with the given identifier is found. Error code: `IIA-AGO-GET-404-001`

        - `HTTP Status Code 500`, when an unexpected error occurs while reading Agent output detail. Error code: `IIA-AGO-GET-500-001`
      operationId: getAgentOutput
      responses:
        '200':
          description: Agent output returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentOutputDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/UnexpectedError'
  /v1/utilities/text/improve:
    parameters:
    - $ref: '#/components/parameters/XWtfProfile'
    post:
      tags:
      - Utilities
      summary: Improve a text with AI
      description: |
        Utility endpoint that sends a single plain string to the AI provider and returns a single improved string.

        The operation is intentionally minimal and is meant to be used first as a safe integration test for AI invocation and later by the application to make operator prompts more ordered, readable and grammatically correct.

        The backend should preserve the original meaning, correct spelling and grammar, improve clarity and readability, and avoid adding operational facts, IDs, constraints or domain details that are not present in the input text.

        ## Errors

        Invalid parameters should raise an HTTP Status Code 400 according with the following list:

        - `HTTP Status Code 400`, when the request body is missing. Error code: `IIA-UTL-TXI-400-001`

        - `HTTP Status Code 400`, when the request body is not a JSON string. Error code: `IIA-UTL-TXI-400-002`

        - `HTTP Status Code 400`, when the text is empty or contains only whitespace characters. Error code: `IIA-UTL-TXI-400-003`

        - `HTTP Status Code 400`, when the text exceeds 8000 characters. Error code: `IIA-UTL-TXI-400-004`

        - `HTTP Status Code 500`, when an unexpected error occurs while improving the text. Error code: `IIA-UTL-TXI-500-001`

        - `HTTP Status Code 503`, when the LLM provider is temporarily unavailable. Error code: `IIA-UTL-TXI-503-001`
      operationId: improveText
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: string
              minLength: 1
              maxLength: 8000
              description: Text to correct and improve. The value is a JSON string, not an object.
              example: Crea un allert quando una corsa viene cancellatta e non e stato fatto nessun annuncio.
      responses:
        '200':
          description: Text improved successfully.
          content:
            application/json:
              schema:
                type: string
                description: Improved text that preserves the meaning of the input.
                example: Crea un alert quando una corsa viene cancellata e non è stato effettuato alcun annuncio.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/UnexpectedError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    XWtfProfile:
      name: X-WTF-PROFILE
      in: header
      required: false
      description: Profile selected by the authenticated user.
      schema:
        type: string
        maxLength: 100
        example: default
    SuggestionId:
      name: suggestionId
      in: path
      required: true
      description: Suggestion identifier.
      schema:
        type: string
        maxLength: 50
        example: SGGS2026251400000001
    AlertId:
      name: alertId
      in: path
      required: true
      description: Alert identifier.
      schema:
        type: string
        maxLength: 50
        example: ALRT2026251400000001
    SessionId:
      name: sessionId
      in: path
      required: true
      description: Assistant session identifier.
      schema:
        type: string
        maxLength: 50
        example: SSSN2026251400000001
    QuestionId:
      name: questionId
      in: path
      required: true
      description: Assistant question identifier.
      schema:
        type: string
        maxLength: 50
        example: QSTN2026251400000001
    AgentProfileId:
      name: agentProfileId
      in: path
      required: true
      description: Agent profile identifier.
      schema:
        type: string
        maxLength: 50
        example: MEDIUM
    AgentDefinitionId:
      name: agentDefinitionId
      in: path
      required: true
      description: Agent definition identifier.
      schema:
        type: string
        maxLength: 50
        example: AGDF2026251400000001
    AgentRunId:
      name: agentRunId
      in: path
      required: true
      description: Agent run identifier.
      schema:
        type: string
        maxLength: 50
        example: AGRN2026251400000001
    AgentOutputId:
      name: agentOutputId
      in: path
      required: true
      description: Agent output identifier.
      schema:
        type: string
        maxLength: 50
        example: AGOU2026251400000001
  responses:
    BadRequest:
      description: Invalid request or invalid parameter.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Errors'
    Unauthorized:
      description: Missing or invalid authentication.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Errors'
    Forbidden:
      description: Authenticated user is not allowed to perform the operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Errors'
    NotFound:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Errors'
    Conflict:
      description: Conflict or invalid workflow transition.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Errors'
    UnprocessableEntity:
      description: The request is syntactically valid but cannot be processed in the assistant domain.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Errors'
    ServiceUnavailable:
      description: A downstream system, tool or LLM provider is not available.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Errors'
    UnexpectedError:
      description: Unexpected error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Errors'
  schemas:
    SuggestionHeader:
      type: object
      description: Compact suggestion representation for dashboard rows.
      required:
      - id
      - status
      - alert
      - targetType
      - targetTitle
      - reason
      - generatedAt
      properties:
        id:
          type: string
          maxLength: 50
          example: SGGS2026251400000001
        status:
          $ref: '#/components/schemas/SuggestionStatus'
        alert:
          $ref: '#/components/schemas/AlertReference'
        targetType:
          $ref: '#/components/schemas/SuggestionTargetType'
        targetTitle:
          type: string
          description: Main target label shown in the row.
          example: RV 1234
        targetSubtitle:
          type: string
          description: Optional target subtitle shown in the row.
          example: Genova Brignole - Savona
        eventName:
          type: string
          description: Source event name or `AUTO` for scheduled checks.
          example: CANCELLATION
        reason:
          type: string
          description: Short reason, generated from verified context and suitable for list display.
          example: Cancellation detected for journey RV 1234 at Genova Brignole.
        confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
          example: 0.91
        operatorAdvicePreview:
          type: string
          example: Inform passengers that the journey is cancelled and avoid proposing unverified alternatives.
        passengerMessagePreview:
          type: string
          example: Si informa la gentile clientela che la corsa RV 1234 diretta a Savona è soppressa.
        hasPassengerMessage:
          type: boolean
          example: true
        operatorAdviceEdited:
          type: boolean
          example: false
        passengerMessageEdited:
          type: boolean
          example: false
        generatedAt:
          type: string
          format: date-time
          example: '2026-05-14T15:22:35Z'
        operatorActionTime:
          type: string
          format: date-time
        operatorUserId:
          type: string
          example: m.user
        generatedByAgent:
          $ref: '#/components/schemas/AgentReference'
        agentOutputId:
          type: string
          maxLength: 50
          example: AGOU2026251400000001
    SuggestionDetail:
      type: object
      description: Complete suggestion detail.
      required:
      - id
      - status
      - alert
      - target
      - reason
      - operatorAdvice
      - generatedAt
      properties:
        id:
          type: string
          maxLength: 50
          example: SGGS2026251400000001
        status:
          $ref: '#/components/schemas/SuggestionStatus'
        alert:
          $ref: '#/components/schemas/AlertReference'
        eventName:
          type: string
          description: Source event name or `AUTO` for scheduled interpreters.
          example: CANCELLATION
        source:
          $ref: '#/components/schemas/SuggestionSource'
        target:
          $ref: '#/components/schemas/SuggestionTarget'
        reason:
          type: string
          maxLength: 1000
          description: Short, operator-readable reason generated by the suggestion normalization step.
          example: A cancellation event was detected for journey RV 1234 at Genova Brignole.
        operatorAdvice:
          type: string
          maxLength: 4000
          description: Suggested operational advice for the operator.
          example: Inform passengers that the journey is cancelled. Avoid proposing alternatives unless they are confirmed
            by operational data.
        generatedOperatorAdvice:
          type: string
          readOnly: true
          description: Original generated advice before operator edits.
        operatorAdviceEdited:
          type: boolean
          example: false
        passengerMessage:
          type: string
          maxLength: 4000
          nullable: true
          description: Suggested passenger-facing message. It can be absent when no public communication is needed.
          example: Si informa la gentile clientela che la corsa RV 1234 diretta a Savona è soppressa.
        generatedPassengerMessage:
          type: string
          readOnly: true
          nullable: true
          description: Original generated passenger message before operator edits.
        passengerMessageEdited:
          type: boolean
          example: false
        confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
          example: 0.91
        generation:
          $ref: '#/components/schemas/SuggestionGenerationMetadata'
        operatorAction:
          $ref: '#/components/schemas/OperatorAction'
        context:
          type: object
          additionalProperties: true
          description: Compact verified context used to generate the suggestion. Intended for diagnostics, not for primary
            UI layout.
        generatedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        generatedByAgent:
          $ref: '#/components/schemas/AgentReference'
        agentOutputId:
          type: string
          maxLength: 50
          example: AGOU2026251400000001
    SuggestionSource:
      type: object
      description: Information about the source that produced the interpreter input.
      properties:
        sourceSystem:
          type: string
          enum:
          - SERVICE_DATA
          - ANNOUNCEMENT
          - BROADCAST
          - DEVICE
          - CONTENT
          - CONFIGURATION
          - ASSISTANT
          - SCHEDULED_CHECK
          - OTHER
          example: SERVICE_DATA
        sourceEventId:
          type: string
          example: evt-20260514-0001
        sourceEventName:
          type: string
          example: CANCELLATION
        sourceEventTime:
          type: string
          format: date-time
        correlationKey:
          type: string
          description: Stable key used to avoid duplicate open suggestions.
          example: SERVICE_DATA:CANCELLATION:RV1234:GENOVA-BRIGNOLE:20260514T152235
    SuggestionGenerationMetadata:
      type: object
      description: Compact process metadata for audit and troubleshooting.
      properties:
        interpreterType:
          $ref: '#/components/schemas/AlertInterpreterType'
        interpreterClassName:
          type: string
          example: GeneratedCancellationWithoutAnnouncementInterpreter
        generatedByLlm:
          type: boolean
          example: true
        llmProvider:
          type: string
          example: azure-openai
        llmModel:
          type: string
          example: gpt-4o-mini
        promptCode:
          type: string
          example: GENERATE_SUGGESTION_FROM_INTERPRETER_OUTPUT
        promptVersion:
          type: string
          example: 0.0.1
        warnings:
          type: array
          items:
            type: string
        agentDefinitionId:
          type: string
          maxLength: 50
          example: AGDF2026251400000001
        agentRunId:
          type: string
          maxLength: 50
          example: AGRN2026251400000001
        agentOutputId:
          type: string
          maxLength: 50
          example: AGOU2026251400000001
        artifactType:
          $ref: '#/components/schemas/AgentArtifactType'
        artifactHash:
          type: string
          example: sha256:5f2b6c...
    SuggestionTextPatchRequest:
      type: object
      description: Editable text fields of a suggestion.
      properties:
        operatorAdvice:
          type: string
          maxLength: 4000
          description: Updated operator advice.
        passengerMessage:
          type: string
          maxLength: 4000
          nullable: true
          description: Updated passenger-facing message. Send null to explicitly remove the passenger message if the implementation
            allows it.
        operatorNote:
          type: string
          maxLength: 1000
          description: Optional note explaining the edit.
    SuggestionApprovalRequest:
      type: object
      description: Request used to approve a suggestion.
      properties:
        operatorAdvice:
          type: string
          maxLength: 4000
          description: Optional final operator advice override.
        passengerMessage:
          type: string
          maxLength: 4000
          nullable: true
          description: Optional final passenger-facing message override.
        operatorNote:
          type: string
          maxLength: 1000
          description: Optional operator note.
          example: Approved after checking the operational context.
    SuggestionRejectionRequest:
      type: object
      description: Request used to reject a suggestion.
      properties:
        operatorNote:
          type: string
          maxLength: 1000
          description: Optional rejection note.
          example: The event has already been handled by the control room.
    SuggestionTarget:
      type: object
      description: Typed suggestion target. Exactly one target type must be represented according to `targetType`.
      required:
      - targetType
      properties:
        targetType:
          $ref: '#/components/schemas/SuggestionTargetType'
        serviceDataJourney:
          $ref: '#/components/schemas/ServiceDataJourneyTarget'
        serviceDataJourneyAggregate:
          $ref: '#/components/schemas/ServiceDataJourneyAggregateTarget'
        monitoredAudioMessage:
          $ref: '#/components/schemas/MonitoredAudioMessageTarget'
        monitoredAudioMessageAggregate:
          $ref: '#/components/schemas/MonitoredAudioMessageAggregateTarget'
        generic:
          $ref: '#/components/schemas/GenericSuggestionTarget'
    ServiceDataJourneyTarget:
      type: object
      description: Target representing one Service Data journey.
      required:
      - journeyName
      properties:
        serviceDataRef:
          type: string
          description: Technical Service Data reference if available.
          example: SD-VJ-1234
        journeyName:
          type: string
          example: RV 1234
        journeyRef:
          type: string
          example: VJ-1234
        lineName:
          type: string
          example: Regionale Veloce
        originName:
          type: string
          example: Genova Brignole
        destinationName:
          type: string
          example: Savona
        stopPoint:
          $ref: '#/components/schemas/StopPointRef'
        plannedDepartureTime:
          type: string
          format: date-time
        estimatedDepartureTime:
          type: string
          format: date-time
        delayMinutes:
          type: integer
          example: 15
        cancelled:
          type: boolean
          example: true
        platform:
          type: string
          example: '4'
        metadata:
          type: object
          additionalProperties: true
    ServiceDataJourneyAggregateTarget:
      type: object
      description: Target representing an aggregate of Service Data journeys.
      required:
      - items
      properties:
        title:
          type: string
          example: Cancelled journeys without announcements
        criteria:
          type: string
          example: Cancelled journeys at Genova Brignole in the last 30 minutes without passenger announcements.
        items:
          type: array
          items:
            $ref: '#/components/schemas/ServiceDataJourneyTarget'
        totalItems:
          type: integer
          example: 3
        metadata:
          type: object
          additionalProperties: true
    MonitoredAudioMessageTarget:
      type: object
      description: Target representing one monitored audio message.
      required:
      - audioMessageRef
      properties:
        audioMessageRef:
          type: string
          example: MAM-20260514-0001
        audioMessageName:
          type: string
          example: Delay announcement for RV 1234
        journeyName:
          type: string
          example: RV 1234
        stopPoint:
          $ref: '#/components/schemas/StopPointRef'
        messageText:
          type: string
          example: La corsa RV 1234 partirà con circa 15 minuti di ritardo.
        language:
          type: string
          example: it-IT
        channel:
          type: string
          example: AUDIO
        status:
          type: string
          example: GENERATED
        generatedAt:
          type: string
          format: date-time
        broadcastAt:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
    MonitoredAudioMessageAggregateTarget:
      type: object
      description: Target representing an aggregate of monitored audio messages.
      required:
      - items
      properties:
        title:
          type: string
          example: Audio messages generated but not broadcast
        criteria:
          type: string
          example: Audio messages for delayed journeys that have no successful broadcast trace.
        items:
          type: array
          items:
            $ref: '#/components/schemas/MonitoredAudioMessageTarget'
        totalItems:
          type: integer
          example: 2
        metadata:
          type: object
          additionalProperties: true
    GenericSuggestionTarget:
      type: object
      description: Generic target used when the suggestion is an operational evaluation not directly linked to one journey
        or message.
      required:
      - title
      properties:
        title:
          type: string
          example: Passenger information consistency check
        description:
          type: string
          example: The assistant detected a possible inconsistency between Service Data and broadcast history.
        severity:
          $ref: '#/components/schemas/SuggestionSeverity'
        metadata:
          type: object
          additionalProperties: true
    AlertSummaryListResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AlertSummary'
    AlertSummary:
      type: object
      required:
      - id
      - name
      - status
      - enabled
      - createdAt
      properties:
        id:
          type: string
          maxLength: 50
          example: ALRT2026251400000001
        name:
          type: string
          example: Cancelled journeys without announcements
        status:
          $ref: '#/components/schemas/AlertStatus'
        enabled:
          type: boolean
          example: true
        interpreterType:
          $ref: '#/components/schemas/AlertInterpreterType'
        targetTypes:
          type: array
          items:
            $ref: '#/components/schemas/SuggestionTargetType'
        confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
          description: Estimated detection success/confidence shown by the UI.
          example: 0.86
        lastVerification:
          $ref: '#/components/schemas/AlertVerificationSummary'
        technicalSpecificationEdited:
          type: boolean
          description: Indicates whether the current validated technical specification was manually replaced after the last
            successful AI-assisted verification.
          example: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        version:
          type: integer
          format: int32
          example: 1
    AlertDetail:
      type: object
      required:
      - id
      - name
      - prompt
      - status
      - enabled
      - createdAt
      properties:
        id:
          type: string
          maxLength: 50
          example: ALRT2026251400000001
        name:
          type: string
          maxLength: 120
          example: Cancelled journeys without announcements
        description:
          type: string
          maxLength: 1000
          example: Detects cancelled journeys for which no passenger announcement has been generated or broadcast.
        prompt:
          type: string
          maxLength: 8000
          description: Free-text prompt inserted by the operator.
          example: Create a suggestion when a journey is cancelled and no audio message has been broadcast within five minutes.
        status:
          $ref: '#/components/schemas/AlertStatus'
        enabled:
          type: boolean
          example: true
        verification:
          $ref: '#/components/schemas/AlertVerificationResult'
        technicalSpecificationEdited:
          type: boolean
          description: |
            Indicates whether the current validated technical specification was manually replaced by an
            expert user after the last successful AI-assisted verification.

            `false` means that the current technical specification was produced directly by the governed
            verification pipeline.

            `true` means that the technical specification was later replaced through
            `PUT /v1/alerts/{alertId}/technical-specification` and successfully validated by the backend.

            A new successful `POST /v1/alerts/{alertId}/verify` recalculates the technical specification
            from the stored prompt and resets this flag to `false`.
          example: false
        interpreter:
          $ref: '#/components/schemas/AlertInterpreter'
        requiredData:
          type: array
          description: Data categories required by the interpreter.
          items:
            $ref: '#/components/schemas/AlertRequiredData'
        runtime:
          $ref: '#/components/schemas/AlertRuntimeMetadata'
        createdBy:
          type: string
          example: m.user
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true
        version:
          type: integer
          format: int32
          description: Monotonic Alert version. A new version is produced when prompt or relevant verification inputs change.
          example: 1
        agentDefinitions:
          type: array
          description: Agent definitions generated from this Alert.
          items:
            $ref: '#/components/schemas/AgentDefinitionSummary'
    AlertCreateRequest:
      type: object
      required:
      - name
      - prompt
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
          example: Cancelled journeys without announcements
        description:
          type: string
          maxLength: 1000
        prompt:
          type: string
          minLength: 10
          maxLength: 8000
          description: Free-text alert rule written by the operator.
          example: Create a suggestion when a journey is cancelled and no audio message has been broadcast within five minutes.
        verifyImmediately:
          type: boolean
          default: false
          description: If true, the backend immediately starts AI-assisted verification for the newly created alert. The alert
            enters `VERIFYING` first and can then become `VERIFIED`, `REJECTED` or `ERROR` according to the verification result.
            If false, the alert is only persisted as `DRAFT`; no verification is started and no interpreter metadata is produced
            until `POST /v1/alerts/{alertId}/verify` is called.
          example: true
        enableAfterVerification:
          type: boolean
          default: false
          description: If true, the alert is enabled automatically only when verification succeeds. This flag is meaningful
            only when `verifyImmediately` is true or when a later explicit verification succeeds.
    AlertUpdateRequest:
      type: object
      required:
      - name
      - prompt
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
          example: Cancelled journeys without announcements
        description:
          type: string
          maxLength: 1000
          example: Detects cancelled journeys for which no passenger announcement has been generated or broadcast.
        prompt:
          type: string
          minLength: 10
          maxLength: 8000
          description: |
            Free-text alert rule written by the operator.

            If this value is different from the currently persisted prompt, every
            previously verified technical interpretation must be considered obsolete.
            The backend must either reset the Alert to `DRAFT` or start a new verification
            according to `verifyImmediately`.
          example: Create a suggestion when a journey is cancelled and no audio message has been broadcast within five minutes.
        verifyImmediately:
          type: boolean
          default: false
          description: |
            If true and the prompt has changed, the backend starts AI-assisted
            re-verification after updating the Alert.

            If the prompt has not changed, this flag is ignored.

            If false and the prompt has changed, the Alert is reset to `DRAFT` with
            verification status `PENDING`, without starting AI-assisted verification.
          example: true
        enableAfterVerification:
          type: boolean
          default: false
          description: |
            Accepted for symmetry with `AlertCreateRequest`.

            During update, this flag must not be used to enable an Alert that was
            disabled before the prompt change. If the Alert was enabled before the
            update, the backend may restore `enabled = true` only after the new
            verification completes successfully with status `VERIFIED`.
          example: false
