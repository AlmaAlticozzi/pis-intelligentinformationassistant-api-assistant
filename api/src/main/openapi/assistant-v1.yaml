    put:
      tags:
      - Alerts
      summary: Update alert definition
      description: |
        Updates an existing Alert definition.

        The request body has the same business shape as `AlertCreateRequest`: `name`,
        `description`, `prompt`, `verifyImmediately` and `enableAfterVerification`.

        ## Update behaviour

        The backend must compare the incoming `prompt` with the currently persisted prompt.

        - If the prompt is unchanged, the operation updates only mutable descriptive
          fields such as `name` and `description`.
          No AI-assisted verification is started.
          Existing lifecycle status, verification result, interpreter metadata,
          technical specification, agent blueprint preview and enabled flag are preserved.
          Manual technical specification edit metadata is preserved.
          In this case `verifyImmediately` and `enableAfterVerification` are ignored.

        - If the prompt changes and `verifyImmediately = false` or is omitted, the
          Alert is updated and reset to `DRAFT`.
          The verification status becomes `PENDING`.
          The Alert is disabled.
          Previous interpreter metadata, interpreted target types, interpreted event names,
          technical specification, agent blueprint preview, warnings and safety checks
          must be cleared because they refer to the previous prompt.
          A new explicit verification can be started later through
          `POST /v1/alerts/{alertId}/verify`.

        - If the prompt changes and `verifyImmediately = true`, the Alert is updated
          and reset to `VERIFYING`.
          The verification status becomes `PENDING`.
          The Alert is disabled while the new verification is running.
          The backend starts AI-assisted verification using the same governed verification
          pipeline used by `POST /v1/alerts` with `verifyImmediately = true`.
          If the implementation is asynchronous, this endpoint can return immediately
          with status `VERIFYING`; the UI must poll `GET /v1/alerts/{alertId}` to read
          the final result.

        - `enableAfterVerification` is accepted for contract symmetry with
          `AlertCreateRequest`, but during update it must not be used to enable an
          Alert that was not enabled before the prompt change.
          If the Alert was enabled before the update, the backend may restore
          `enabled = true` only after the new verification completes with status
          `VERIFIED`.
          If the previous Alert was not enabled, the final Alert must remain disabled
          even when verification succeeds.

        - A verified interpreter must never remain active after its source prompt has
          changed without successful re-verification.

        - Updating an Alert must not create Agent Definitions, Agent Runs, Agent Outputs
          or Suggestions.

        ## Errors

        Invalid parameters should raise an HTTP Status Code 400 according with the following list:

        - `HTTP Status Code 400`, when the `alertId` path parameter is empty or contains
          only whitespace characters. Error code: `IIA-ALT-UPD-400-001`

        - `HTTP Status Code 400`, when the `alertId` path parameter exceeds 50 characters.
          Error code: `IIA-ALT-UPD-400-002`

        - `HTTP Status Code 400`, when the request body is missing.
          Error code: `IIA-ALT-UPD-400-003`

        - `HTTP Status Code 400`, when the request body is not a valid JSON serialization
          of schema `AlertUpdateRequest`. Error code: `IIA-ALT-UPD-400-004`

        - `HTTP Status Code 400`, when the `name` field is missing, empty or contains
          only whitespace characters. Error code: `IIA-ALT-UPD-400-005`

        - `HTTP Status Code 400`, when the `name` field exceeds 120 characters.
          Error code: `IIA-ALT-UPD-400-006`

        - `HTTP Status Code 400`, when the `description` field exceeds 1000 characters.
          Error code: `IIA-ALT-UPD-400-007`

        - `HTTP Status Code 400`, when the `prompt` field is missing, empty, contains
          fewer than 10 characters or exceeds 8000 characters.
          Error code: `IIA-ALT-UPD-400-008`

        - `HTTP Status Code 400`, when `verifyImmediately` is not a boolean value.
          Error code: `IIA-ALT-UPD-400-009`

        - `HTTP Status Code 400`, when `enableAfterVerification` is not a boolean value.
          Error code: `IIA-ALT-UPD-400-010`

        - `HTTP Status Code 404`, when no Alert with the given `alertId` is found.
          Error code: `IIA-ALT-UPD-404-001`

        - `HTTP Status Code 409`, when the Alert is deleted and cannot be updated.
          Error code: `IIA-ALT-UPD-409-001`

        - `HTTP Status Code 409`, when an active Alert with the same normalized name
          already exists. Error code: `IIA-ALT-UPD-409-002`

        - `HTTP Status Code 409`, when the Alert is currently verifying and cannot be
          updated. Error code: `IIA-ALT-UPD-409-003`

        - `HTTP Status Code 500`, when an unexpected error occurs while updating the
          Alert definition. Error code: `IIA-ALT-UPD-500-001`

        - `HTTP Status Code 503`, when `verifyImmediately = true` and the verification
          service or LLM provider is temporarily unavailable.
          Error code: `IIA-ALT-UPD-503-001`
      operationId: updateAlert
      parameters:
      - name: alertId
        in: path
        required: true
        description: Alert identifier.
        schema:
          type: string
          maxLength: 50
          example: ALRT2026251400000001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertUpdateRequest'
      responses:
        '200':
          description: |
            Alert updated successfully. If the prompt changed and immediate verification
            was requested, the returned Alert can be in `VERIFYING` while background
            verification completes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
